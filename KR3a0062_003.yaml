body:
  text: 項氏家說卷三宋項安世撰說經篇三孔氏古文尚書二十五篇按孔氏所多者虞書則大禹謨一篇夏書則五子之歌𦙍征二篇商書則仲虺湯誥伊訓三太甲咸有一德三說命凡十篇周書則三泰誓武成旅獒微子蔡仲周官君陳畢命君牙冏命凡十二篇此二十五篇皆孔氏自以隸書古篆訓釋科斗之文乃皆明白瀏亮略無疑闕而其餘與今文同者三十三篇以孔氏之字書參伏生之親授當更明白乃反多聱牙不可誦說又伏生耄矣于難誦者一字不遺而明白易曉者乃皆忘之此亦事理之不可曉者意者古語古字本自難通孔氏訓時頗有改定之功如今之譯經潤文者爾不然何其無一讀之聱牙一簡之摩滅乃反平易于老生親𫝊之書耶孔安國傳先儒注釋其有補于經者甚多凡行于世者皆不茍也孔安國之于尚書至為有功如注湯欲遷夏社不可衆人不過謂屈于伊陟臣扈之諫耳安國則曰以棄代稷無可代社者故仍用句龍氏然後知社稷之制至今沿之者為有由也酒誥曰盡執拘以歸于周豫其殺衆人止言待新民寬故勿殺待舊民嚴故盡殺之安國則曰豫當擇其罪之大而殺之然後周公之訓為可傳也其他如此類者甚多經學既廢人習新說古注皆不知讀先儒之苦心不明于今者何可勝數如趙岐注孟子至大至剛以直必有事焉而勿正皆以為伊川先生新讀如此而不知其為趙氏之本注也俗學之陋至此亦可憫哉平在朔易朔者終而復始易者窮而復通北方終窮之地故以朔易名之示天道無終窮之理也鯀哉凡人之名稱有復字者不助辭如𦙍子朱共工歡兜虞舜伯禹是也單稱一字者加哉字鯀哉益哉埀哉是也他書單名以也字副之回也賜也之類姓氏古者姓與氏為二後世姓與氏為一姓者諸眷之所同氏者一房之所獨姓以别同異氏以定親疏皆不可無也如媯姓之生衆矣凡居於媯汭者不知其幾族皆同姓也而于諸媯之中有虞氏焉則舜之家所獨稱也故書載堯之嫁女曰釐降二女于媯汭嬪于虞言媯以著姓明自祁適媯所以正婚姻之禮也言虞以别氏明所歸之族所以詳室家之辨也古人于此謹矣後世直以氏為姓一家百族同用一氏親疏逺近更無分别則與古之用姓同矣故史臣書之皆曰姓某氏見姓之與氏自是為一不可復知也禮記大𫝊謂婚禮至周始繫之以姓而百世不通非也此蓋惑于後世五帝三王同出一祖之說不可用以為據昔者聖人之立姓也專以為婚姻之辨字皆從女惟女子稱姓以别之是則有姓之初便有婚姻不通之法矣此法必起于黃帝故凡天下之姓皆自以為黃帝吾祖也其實人之有姓自黃帝始爾蓋是時始置二十五姓以别臣宗而後世遂以為此帝之二十五子云姓氏之法至漢猶有存者夏侯嬰為滕公子孫遂為滕氏又有與公孫主為婚者遂為孫氏田千秋好乘小車子孫遂為車氏史記諸臣傳稱滕公萬石君太倉公魏其武安皆不著姓此即古人以官為氏之意蓋用此以自别于同姓之諸侯然自是遂忘其本姓則史職不修之過也古者太史氏掌奠世系辨昭穆凡立氏者必告于太史氏春秋之末知果别族于太史為輔氏此其驗也後世史職既廢宗法又亡而欲田里之氓自記其世系難矣此其故皆由封建世祿井田之法壞諸侯卿大夫之後降為氓隸士庶人之族散而之四方故宗法不可得而立史職不可得而紀以至于大廢而盡亡也三苖族系左氏春秋傳昭公九年周人以姜戎咎晉言曰先王居檮杌于四裔故允姓之姦居于瓜州而惠公實誘以來杜預謂允姓即姜戎之别瓜州三危之地按此則姜戎者三苖之後也襄公十四年晉人責姜戎亦言為惠公自瓜徙洛戎子對曰我姜戎四嶽之裔也按姜姓實出太嶽則三苖氏又四嶽之後文公十八年史克列叙四凶謂三苖為縉雲氏不才子按縉雲氏實黃帝時官名則四嶽又縉雲氏之後也隱公十一年鄭莊公謂許為太嶽之𦙍杜注言太嶽神農之後堯四嶽也按神農氏姜姓則縉雲氏又神農之後也蓋神農氏沒子孫仕于黃帝為縉雲氏仕于堯為四嶽而四嶽之子孫受封于南方者為三苖三苖之子孫長于西方者為姜戎云齊滅紀晉滅姜戎楚滅申及許陳氏滅齊則四嶽之子孫固皆亡于春秋之時矣然西魏時宕昌羌梁企定猶是三苖之後其所憑藉實遠大云九功九德舜之九功即禹之八政也府以積貯言之于五行之外增穀為六者當時水土之政主為穀也政以施行言之金木土各以其類增而為八者天下已平為萬世法則賓祀教刑森然竝舉皆不可略也九功則用五行以治穀用穀以治三事自粗而至精也八政則五行各致其用精粗竝舉而三事在其中矣賓祀教兵刑皆以正德司空以利用食貨以厚生也臯陶之九德即禹之三德也寬柔願皆柔克也簡剛彊皆剛克也亂擾直皆正直也亂訓治擾訓馴治且馴則無事矣禹衍而為五以明己之治臯陶析而為九以察人之德故其目為愈詳也要之五行之理聖賢皆體而用之至禹而後極上極下而備衍之以成一家之言耳帝德罔愆安世嘗謂惟臯陶最善稱舜者夫舜之德至難名也臯陶特立罔愆二字以為總目謂其凡事竝無過失則舜之終身本末皆備于此矣然嘗疑之今之言舉事無失者必以為精明之極而臯陶言舜之無失乃以簡寬得之則已與常說大異矣至指陳其簡寬之實迹則曰罪疑惟輕功疑惟重與其殺不辜寧失不經則又近于聵聵者夫治天下者必使賞當功罰當罪不殺無辜不失有罪則可謂無失矣而舜之于功罪不能使賞罰之必當而但能使疑者之蒙私不能使罪人之必得而但能使無辜之不見殺臯陶以此為舜之無所過失之驗是則其所為無失者特不失其仁厚之本心而已故其末繼之曰好生之德洽于民心茲用不犯于有司此則其罔愆之主意也世之治亂皆係于人主之聰與否古今之言聰明者未有過于舜者而舜之為治乃不能自保其無疑與失也其可保者獨吾之好生之心不疑不失而已後之人自視聰明孰與舜多而必欲其賞罰之必行功罪之必得是欲以己之所為求勝于舜也舜必不可勝則其所刑殺過差多矣此申商之所以得罪于萬世也不然則信賞必罰天下至明之政也而何亡人之國若是之亟哉孔子以用中于民為舜之大知其意深矣九江孔殷謝靈運入彭蠡湖口詩云三江事多往九派理空存然則當是時九江已不可考矣沱潛荆梁二州江漢所經皆有沱潛二水爾雅謂水自江出為沱自漢出為潛蓋經師所傳如此其辭簡古故至今莫知二水之處按四瀆濟最微無可言者河最大而出于西域至中國而成河故别流之來合者皆不可見獨江漢二水近出梁州夾蜀山而行江在山之南漢在山之北自梁至荆山行凡數千里凡山南溪谷之水皆至江而出山北溪谷之水皆至漢而出其水衆多不足盡録故南總為沱北總為潛蓋當時之方言猶今溪谷云爾後之讀爾雅者誤以江漢為沱潛所出之源不知其為沱潛所出之路也禹貢言岷山導江東别為沱别猶言他也蓋江之發源在岷山極西處自江源而東凡别水之來會者皆為此江之沱不得自為一水也今蜀江沿岸溪水合處猶有鑑沱句流沱月明沱歸鄉沱之名尚可推見當時命名之意云用人惟已班叔皮王命論曰見善如不及用人如由己此可作用人惟己解注盤庚商盤周誥古今以為聱牙而當時用之以告民庶何哉曰此其所以為聱牙也告民庶之辭與作文章不同告民庶者必俯而就之或用時語或用方言或用官府吏文或辨釋當時事因所以在當時衆庶為易曉在異代異俗為難通也如今郡縣曉諭文榜自有土俗常用之語與其所常有之事他鄉之人多不盡曉况後世乎說命序傅說起于徒役之中而居父兄百官之上此雖高宗之盛舉亦古者置相之常道也故聖人序書不言作相之事蓋以古天子諸侯之立國皆有父兄大臣以為社稷之重鎮常與其君共求賢哲而付之以政所謂當國行政者非必父兄大臣也故曰將使卑踰尊疏踰戚可不愼歟此言為當國行政者設也堯舜之時四嶽為大臣而舜禹行政湯之時仲虺為大臣而伊尹往來行政于其間成王之時太公為太師召公為太保而周公行政其後周公畢公皆以太師出守東都而召公以太保行政其序位皆在周畢之上而官秩仍在其下不以為疑也齊以高子國子為上卿而管仲為政鄭以子皮為上卿而子産為政魯以季氏為上卿而孔子為政非若後世茍用一人必須移動大臣排絀故老而後可為也夫是以君之用之也易而臣之居之也安大臣亦相與出力而推奬之無有相傾相軋之事雖其人皆有推遜之誠亦其理勢之可以相安也六國之時所以迭用他國之臣為相亦其去古之近于國之舊臣利害無所相及也至國朝承唐官制罷相者皆歸本班猶有古意自官制一新凡執國政者一去其位則不復得侍于闕廷必俟彼出而後此入此爭端之所以不息也西伯戡黎序先儒謂西伯戡黎故殷始咎周此非書意也按書中但言西伯戡黎祖伊恐奔告于受爾至孔子作序乃言殷始咎周周人乘黎祖伊恐奔告于受作西伯戡黎以文勢考之咎周乃在乘黎之先蓋文王之世殷未嘗咎周也至武王之末年殷始咎周疑間生而責讓至度其事勢必有侵伐之謀武王于是戡黎國以據壺關之險東向臨之牧野之事蓋決于此時矣故孔子改戡為乘高以臨紂以見兵勢之成又推其釁隙起于殷人之咎周以見兵端之發聖人于殷周之際多言書外之事皆明著本末以示後來蓋書有不必存者而事則不可不存也史記膠鬲問武王之師曰西伯曷為而來此武王稱西伯之驗也西土有衆武王渡河雖曰羣后畢會及聆其誓語專以西土邦君為言則孟津之會皆西土之諸侯也蓋紂都河北正天下之徑兵所處用南方之人未必勝之故武王之所用皆關隴蜀漢之士先以河東之兵塞壺關之險以為疑兵而武王自以西土之衆自關向洛整陳徐行以為正兵自孟津北河攻之故曰同力度德武王之慮精矣惟九年大統未集說者以此為文王受命之九年非也史記周本紀太公世家周公世家皆言武王即位九年乃觀兵于盟津明此即武王之九年也時已十一年矣何以謂之九年古者天子諸侯皆除喪之後始即政事之位通初喪數之為十一年但數即政之年則九年耳自魯成公以來始有踰年即位之事春秋書之譏不終喪也惟親政九年大統未集故武王未得盡承文王由舊之志今既集矣其承厥志乃反商政政由舊所以承之也武成脫簡王介甫以此篇為脫簡當以厥四月哉生明至豫小子其承厥志移在天下大定之下此說良是必如此然後文理可讀月日亦順又見武王所承之志上謂文王欲由商之舊政而未得今豫小子不可不承故次以乃反商政政由舊此即承志之事也若如本文則是文王志在砥商之罪而武王承之也豈不上誣先志哉周王發先儒謂周王乃史官追書之辭方告名山大川時武王未稱王也且以文王尚稱文考為證此說非也若商命未絶則武王不當起兵既已起兵則周之稱王必矣決無以商之臣子號令羣后上伐天王之理也文王之稱文考乃是歸周祀廟告成之後始行追王之禮方起兵時尚未暇也癸亥陳于商郊紂之為人與桀不同桀不過昏庸暴虐如秦二世漢桓靈而已紂好勇而善疑有伸鉤索鐡之力而專養亡命逋逃之人以為親兵百戰百克天下畏之其失在于恃兵狂酗殺人為嬉不恤國事此正如前趙之劉曜北齊之高歡未可以脆敵待也故武王伐紂其規模與湯不同武王先取壺關以塞紂西向之路然後自洛陽渡河攻之初以戊子日離宗周整衆徐行日三十里自周至洛九百里凡一月而後至人力不勞兵勢不急紂固恃兵之強與大河之固安坐而未出也既戊午涉河一日而誓師明日復誓遂行自孟津至朝歌四百餘里凡五日而至癸亥之夕徑陳于國門之外甲子之朝紂狼狽出師人心震駭皆望塵而奔周人自後攻之盡𠞰其多罪逋逃之衆血流漂杵舊惡無餘于是善良奠枕而天下定矣唐太宗討薛仁杲六十日不戰一戰而散其精卒遂平隴右本朝狄武襄公自離京師行止竝有定法晷刻不差及至崑崙關卷甲夜度遂一戰而定廣南其制勝之方大略相類聖賢舉事以理固無後世之利心而處事以義亦無腐儒之癡法也五紀歲以紀一歲之事月以紀一月之事日以紀一日之事星辰謂二十八星十二辰以紀九州之分土萬民之好惡厯數如太初三統以紀帝王之運世天度之從違王省惟歲章當在此下皇極皇建其有極斂時五福用敷錫厥庶民此言君之導其民也惟時厥庶民于汝極錫汝保極此言民之從其君也此六句皇極一章之總目也自此以下分為兩大段以演說此兩節之事自凡厥庶民無有淫朋以下至汝雖錫之福其作汝用咎皆演說君之導民也自無偏無陂遵王之義以下至會其有極歸其有極皆演說民之從君也又曰皇極之敷言是彝是訓于帝其訓言人君配天立極以結上一節之意也凡厥庶民極之敷言是訓是行以近天子之光言庶民從君如天以結下之一節也又曰天子作民父母言上之教養之心如此其切也以為天下王言下之歸往之心如此其一也此三節皆反覆推明君民之義言愈近而意愈切也惟辟作福恐當在此章下五紀皇極此二章皆有脫簡曰王省惟歲至則以風雨當在五紀章之內與庶徵章全無干涉也惟辟作福至民用僭忒當在皇極章之末其文與為天下王相接其意與惟皇作極相類且所言福威皆皇極章內之事與三德殊不相關也三德剛克柔克自是二德之名剛多于柔者為剛克柔多于剛者為柔克非謂以剛柔勝人也以政言之強者禦之以剛弱者撫之以柔此于五行屬太剛太柔也以教言之高者抑之使柔卑者振之使剛此于五行屬少剛少柔也正直則中德也雖曰三德而五在其中禮家以一為三以三為五以五為九其理皆出于此蓋一本不動而二自為四四自為八故謂之九易之八卦書之九疇其義一也曰貞曰悔人但知內卦為貞外卦為悔不知其何說也王介甫謂靜為貞動為悔亦臆之而已此占家之事惟京氏易謂發為貞靜為悔則合于筮法蓋占家以內卦為用事謂問者之來意也外卦為直事謂禍福之決也來意方發專一之至故謂之貞外卦既成禍福始定故有悔焉蓋卦有元亨利貞故取貞字為主爻有吉凶悔吝故取悔字為決也姚小彭氏作易內外傳以吉凶悔吝為元亨利貞之反其言亦有理初聞者必訝其異然不可不思也竊意夏商筮法止用貞悔至文王之易以變爻為占六爻皆不變者乃占貞悔則不止用二矣五福六極福極皆人君之事攸好德者黎民敏德也惡者賊民興也康寧者內外無患也憂者國家多難也疾者癘疫流行也弱者寖以衰微也凶者考終命之反短折者壽之反在福為二在極為一也貧與弱者富之反疾與憂者康寧之反在福為一在極為二也惡與好德一福一極也金縢金縢之事本無可疑而說者多疑之蓋謂死無可代之理殊不知此特後世之人自不能行而行之者又不出于誠是以不能動天爾桑林之禱六事自責是湯以身代百姓也雲漢之詩寧俾我遁是宣王以身代百姓也而上天皆為之變動孔融以弟代兄之死吉翂以子代父之死而時君皆為之矜惻其他如王尊之塞決戴封之積薪自古匹夫以必至之誠上動天意者何可勝數况武王之興天所眷佑周公之聖天所賦與因天感天其有不動者乎二公本欲用常禮穆卜周公乃欲以身自卜故不敢以告二公又古者宗廟皆在宫中武王有疾周公以上相攝事獨命祝史與廟中之人為壇墠祝册而公卿大夫皆不知之如後世人主宫中默禱而外庭不知者多矣管叔及其羣弟乃流言于國曰公將不利于孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得孔氏謂辟者行法也居東則東征也信然則周公誅謗以滅口豈所以自明于天下哉鄭氏謂辟讀為避居東則避之也豫嘗反復本文則鄭說為是蓋周室初基中外未定流言乘間而作成王疑于上國人疑于下周公茍不避之禍亂忽發家國傾危將無以見先王于地下矣周公之與二公蓋一體也故密與二公謀之使二公居中鎮撫國事而身自東出避之因以寧輯東夏但不居中則不利之謗自息而亂無從生矣故周公居東二年外變不起而內論亦明向者倡為流言謀作禍亂之人遂得主名內外之人始知其為管叔之罪也衆論既明于下則漸可以開曉成王之惑周公于是作鴟梟之詩極道國家之艱難心迹之勞悴自訴于王以冀王之察己也王雖未能洞然遂信周公之忠然亦未敢決然遂以周公為非者蓋由左右諸大夫國人之論皆已明白無有一言以助成王之疑者故成王之心雖欲非之亦無所據而發也蓋是時也舉國之人疑周公者獨成王一人爾人力既盡則天道從而開之秋大熟未穫天大雷電以風禾偃木拔邦人大恐成王與羣臣辨服以適祖廟啓龜筮之匱以占家國之災此蓋古者遇災之常禮也既得金縢之書二公知天道之在是矣于是導王以問諸史與百執事之人羣臣久鬱承問而興皆翕然曰信以證其事悵然曰噫以明其寃見公本不言而天自發之天理人情憤悱相會于聲嗟氣歎之間而成王之心已豁然而大悟矣于是周家復興天下大定卜年八百卜世三十豈非天人之助也歟夫以當時事體危疑如此成王之意艱重而難回二公之辭裴回而未發百執事之心堙鬱而不吐使周公憪然不避授兵以出討謗己者執而戮之此霍光之所不敢為也而謂周公為之乎蓋周公既歸始相成王大誥多方出兵以誅三監云周公之事再明周家之業再安皆二公之力也故公之出也則告二公而後出明二公之同議也其問諸史與百執事也則書二公及王明非王之及二公也其築大木也則又出于二公之命凡大木所偃盡起而築之茍可以明天理之驗而信周公之功者無所不用其至二公之心可謂貫日月而通神明矣兹其所以為二公也歟康誥酒誥周公命康叔治商曰往敷求殷先哲王曰丕遠惟商耉成人曰師師兹殷罰有倫曰罰蔽殷彝曰劼毖殷獻臣蓋治者必順其俗因其宜用其仁賢而復其善政然後其俗安其民服大凡治新造之國撫新附之民未有不由此而得其歡心者也周公之慮深矣惟民其勑懋和勑古來字也勑懋謂勞來勉懋二字蓋同一意尚書勑字今皆讀為敕蓋因俗音之誤若據本文止當以來字讀之不然則皆改為敕乃可勑天之命與勑我五典若作勤力說于義亦通不煩改說也無或刑人殺人無或二字即戒康叔先儒謂無使權出或人非也此章大意謂刑殺劓則皆出于公法非汝封之所得私無或輒用其私以刑殺劓刵人也酒誥或云康叔以衛侯為王司冦故首篇專諭刑罰是也然不知酒誥一篇亦是為司冦言之周官萍氏掌幾酒謹酒司暴氏掌禁以屬遊飲于市者皆司冦之屬官也惟天降命麴蘖之可為酒酒之可奉賓祭養老勞勸皆天也酒之流可以敗德生禍亦天也故周公于此二者皆以天言之祀兹酒則謂之天降命敗亂喪德則謂之天降威人惟從其命勿犯其威則可謂善事天矣知此然後可以知天周公曰拜手稽首荀子大略篇曰平衡曰拜磬折頭與腰平如衡下衡曰稽首至地曰稽顙大夫之臣拜不稽首以是推之則今之折腰揖即古之拜也今之低頭揖即古之稽首也今之拜伏其頭至地乃類古之稽顙耳然今之拜自是古之跪俯伏三事殊與古拜不類今之揖其形用古之拜其聲用古之喏日者切亦是兩事皆與古揖不類也古揖舉手而無聲君奭豫嘗讀君奭顧命之書而深悲之然後知出而任人之事者誠天下之危機而聖賢之甚不得已也召公親見金縢之事其艱難憂畏如此幸而洛邑既成成王即政二公優游退居田里以息平生之勞此其宜矣而周公方自洛誥之後再為成王之所挽使之留鎮成周以撫東方之諸侯周公復挽召公使之留鎮宗周以撫西方之諸侯一師一保左右相扶召公之意蓋慘然而不樂也周公作君奭一書道商周之近例陳文武之大憂以繫召公而留之召公既留而周公死成王崩于是召公復當周公之危機矣是故導成王以作顧命以正先君之終翊康王以見諸侯以正新君之始蓋傳位于憑几之時而受位于成服之日設兵戈以衛喪主陳玉幣以賓天王彼四海九州知有康王雖百管叔不可得而間也嗚呼悲哉亦可謂艱大之舉矣此與孫權止泣而令三軍順宗麻鞋以見諸將雖時之隆汙不同而鎮遏危疑之意亦不相逺其所異者暫假冕服于一時之頃以正大位而繫人心終反喪服于三年之久以就亮陰而終子道此則後世之所不能行為可恨耳按漢之嗣君皆以太子受位于柩前而即皇帝位于葬後蓋猶以葬訖釋服凖古之祥除自漢而後則並葬後即位之禮而盡去之矣割申勸寧王之德鄭氏禮記注曰周申觀文王之德古文為割申勸寧王之德今博士為厥亂勸寧王之德古文似近之割之言蓋也安世按今博士即漢之今文尚書伏生所傳也古文即孔安國所傳今尚書是也鄭氏訓割為蓋于古讀為通古字多假借如此類甚多如曷為害胡為瑕安為焉何亦為曷為瑕今人曲為割之申之勸之之說皆不若鄭氏之簡明也六月庚午朏書之紀日者必以歷數先之如朔朏生明死魄之類因以寓歷法焉然四代之書惟周為然亦足以見周文之備也又每書必異辭如朏者月之微明即月三日也曰朏足矣又謂之哉生明生明足矣又謂之旁死魄與死魄之日相鄰即生明也蓋一事而三變其文周之俗尚文如此亦史家以文勝質之驗也格其非心書言格其非心孟子訓之曰人不足與適也政不足間也惟大人為能格君心之非觀此則格者非拒而止也若拒而止之則是適其人間其政日與之格鬬非大人之事也六經中格字皆取至到之義有恥且格七旬有苖格格其非心謂化服之至也祖考來格格于皇天格于上帝感通之至也格于藝祖亦謂歸至其處物格而後知至先儒以為窮至其理義亦同此項氏家說卷三
