body:
  text: 項氏家説附錄卷二宋項安世撰中庸臆説天命之謂性率性之謂道脩道之謂教道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隠莫顯乎微故君子慎其獨也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉天命之謂性自然之中也率性之謂道自然之和也脩道之謂教君子學以致其中和也自此以下皆教之事道也者不可須臾離也可離非道也此言太虛沖漠未發者之不可失也是故君子戒慎乎其所不睹恐懼乎其所不聞所以存之也莫見乎隠莫顯乎微此言幾微眹兆將發者之不可妄也是故君子慎其獨也所以審之也喜怒哀樂未發謂之中則所存者得矣發而中節謂之和則所審者當矣中也者天下之大本也天命之性也和也者天下之達道也率性之道也致中和天地位焉萬物育焉脩道之極功也天地位中之至也萬物育和之至也仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也此下言君子小人之所由分使脩道者知所避就道君子之中庸也君子而時中時中猶時敏時習也戒懼慎獨之謂也既君子矣又時中焉此聖所以愈聖小人之中庸也小人而無忌憚也無忌憚者戒懼慎獨之反也既小人矣又無忌憚焉此愚所以愈愚使君子而不時中則小人矣使小人而有忌憚則君子矣君子小人之分無他敬與慢之間耳不曰中和者自道言之也致中和者所以脩中庸之道也子曰中庸其至矣乎民鮮能久矣言人之不能知不能行也子曰道之不行也我知之矣知者過之愚者不及也其不能行非不能行由于不能知也道之不明也我知之矣賢者過之不肖者不及也其不能知非不能知由于不能行也人莫不飲食也鮮能知味也此復自知言之人誰不行惟其不知則不能以實行也子曰道其不行矣夫此復自行言之人誰不知惟其不行則不能以真知也子曰舜其大知也與舜好問而好察邇言隠惡而揚善執其兩端用其中于民其斯以為舜乎猶曰古之人有能之者大舜是也大智非強明自用之智也下文所言者是也好問而好察邇言隠惡而揚善其好善也如此知不足以言之也執其兩端用其中于民不主一説惟善之從其從善也如此行不足以言之也此舜之所以為大知也子曰人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰予知擇乎中庸而不能期月守也子曰囘之為人也擇乎中庸得一善則拳拳服膺而弗失之矣猶曰古之人有能之者顔子是也囘之為人也擇乎中庸得一善知之明也則拳拳服膺而弗失之行之篤也子曰天下國家可均也爵禄可辭也白刃可蹈也中庸不可能也子路問强子曰南方之强與北方之强與抑而强與寛柔以教不報無道南方之强也君子居之衽金革死而不厭北方之强也而强者居之猶曰古之人有能之者子路是也舜不可得得如顔子足矣顔子不可得得如子路足矣君子居之猶曰此君子之徒也而强者居之而汝也猶曰此汝之徒也故君子和而不流强哉矯中立而不倚強哉矯同則流和則不流矣偏則倚中則不倚矣猶有不流不倚云者為勉强者言之也斯二者言道之中也和者無過不及之中中立者不偏之中欲其强于知之也先言和後言中自末而至本亦勉强者之事也國有道不變塞焉强哉矯國無道至死不變强哉矯不流不倚盡矣猶有二不變云者亦為勉强者言之也斯二者言道之庸也死生通塞變之大者能不為死生通塞之所變則可謂庸矣欲其强于行之也舜聖人也故言其與人者顔子學者也故言其守身者子路困而學者也故言其矯揉氣質者孟子人告以有過章其次序亦類此子曰素隠行怪後世有述焉吾弗為之矣君子遵道而行半塗而廢吾弗能已矣君子依乎中庸遯世不見知而不悔唯聖者能之君子之道費而隠費猶博也隠猶約也道雖甚博隠則甚約此章專先言道之費夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾言道之所該形氣不足以盡之故聖人之聖有不能兼于愚夫愚婦之事天地之大有不能免于小民之憾皆形氣之限也故君子語大天下莫能載焉語道之大處則麗于形氣者雖天地猶為小也語小天下莫能破焉語道之小處則麗于形氣者雖毫末猶為大也詩云鳶飛戾天魚躍于淵言其上下察也凡形氣之所至無非道者君子之道造端乎夫婦及其至也察乎天地此言君子之道非言君子也近起于愚夫愚婦遠極于天地之間道無不該夫婦天地以喻大小之極非論其精粗淺深此章專言其費下章言其隠上既分智仁勇之三等此章復極言知行之難欲人之盡其心也然又恐人畏其難故下章以所知所行之近反復言之子曰道不遠人人之為道而遠人不可以為道此言人之脩道其實甚約詩云伐柯伐柯其則不遠執柯以伐柯聣而視之猶以為遠故君子以人治人改而止脩道者以人之道治人之形使改其不合乎人者而合乎人則止豈有費哉忠恕違道不遠施諸己而不願亦勿施于人君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也此以人治人之目也我所施于人者我願之乎否也以我所願治我所施則不敢以施于人矣我所求于人者我能之乎未也以我所求治我所未能則必求有以能于我矣庸徳之行庸言之謹此求于我之事也有所不足不敢不勉己之行必顧己之言不敢以不及也有餘不敢盡己之言必顧己之行不敢以過也言顧行行顧言君子胡不慥慥爾申言之欲其加厚于此也上文四求猶以人與己相顧至此直以己之言行自相顧也人以相顧恕也已自相顧忠也慥慥忠之至也先言恕後言忠欲其因人而反己亦猶強哉矯章先言和後言中也觀此章則所知所行皆近在吾身而道固未嘗費也下章倣此君子素其位而行不願乎其外上章論治已不在外求此章論處事亦不在外求也天下之事不能盡如人意則當循分而行不可于分外妄求處事如此豈不泰然素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉在上位不陵下在下位不援上正己而不求于人則無怨上不怨天下不尤人故君子居易以俟命小人行險以徼幸皆講上二句也子曰射有似乎君子失諸正鵠反求諸其身即正己而不求人也君子之道辟如行遠必自邇辟如登髙必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻孥子曰父母其順矣乎此章言接人不可以外求也治國平天下接人之費者也而其本近在于齊家此所謂隠也妻子兄弟之間無間言則父母悦父母悦則天下安矣然齊家之本則又有其隠者焉自道不遠人至此三章皆自費而趨隠而此一章所趨愈隠故下章極言至隠之義子曰鬼神之為徳其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可揜如此夫此章言至隠之所在也鬼神之為物語小至于不見不聞語大至于物無不體人無不畏其費如此而其所以然者豈有他哉實有是理而已學者誠能體鬼神之徳自盡其心實之于不聞不見之中而博之于事事物物之際則道之費者為我居矣原其用力之地豈非天下之至約乎此君子所以慥慥爾也自此以上皆即道言之欲人之知之也自此以下皆即人言之欲人之行之也子曰舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之故大徳必得其位必得其禄必得其名必得其夀故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令徳宜民宜人受禄于天保佑命之自天申之故大徳者必受命子曰無憂者其惟文王乎以王季為父以武王為子父作之子述之武王纘大王王季文王之緒壹戎衣而有天下身不失天下之顯名尊為天子富有四海之内宗廟饗之子孫保之武王末受命周公成文武之徳追王大王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也春秋脩其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也郊社之禮所以事上帝也宗廟之禮所以事乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎前四章已極言用力之隠故此三章皆言道之功用以明其費獨以舜文武周公言之者皆處人道之變可以見聖人之功用舜居側微父母欲殺之本無得位得祿得夀得名之理文王事商而武王以兵取之武王與子而周公以臣代之皆處危疑之地而舜卒受命天不能窮也武王卒不失顯名人不能訾也周公闡幽明之情極古今之變為武王立八百年之紀綱制度使在天之靈慰喜而無憾萬世之下祖述而無以踰也此皆功用之至難而極盛者也然而用力之初則甚隠矣故皆以孝言之孝者人心之所發也天下之實者莫加焉于武王周公之事獨言喪祭者亦此意也大猶言大本不可復加達猶言達道人所通行也知至于舜謂之大知行至于舜謂之大孝舜為人道之極萬世仰之不可加也周為王制之備萬世由之不可易也此盖古之盡倫盡制者故舉之以為訓也又曰無憂者其惟文王乎以王季為父以武王為子父作之子述之何也此以明舜與武王周公所居之地皆不若文王之易于以見獨舉武王周公之意也宜民以在下者言之宜人則尊卑遠近無不包也然其本在我繼志述事亦内外之言也哀公問政子曰文武之政布在方䇿其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也故為政在人取人以身脩身以道脩道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也此言禮義皆出于仁以明脩道之必以仁也仁者人也即指此身言之義者宜也即指道理言之此全身體無有不仁則其發用處自無往而不為義也義即天下達道也古人言道多以禮義言之表記言仁者人也道者義也正與此章義同天下之人物雖皆此身之所當體然未有親于父母者故曰親親為大天下之事理雖當以義制之而未有先于尊道而尚賢者故曰尊賢為大既有大小則便有降殺等差而禮節興庶政出矣故曰親親之殺尊賢之等禮所生也凡此皆以明能脩道之義在下位不獲乎上民不可得而治矣故君子不可以不脩身思脩身不可以不事親思事親不可以不知人思知人不可以不知天此言脩道以仁之方也脩身事親仁之事也知人知天仁之禮也欲為其事不可不知其理也生曰人死曰鬼人之所以為人者以其生也仁者人也仁者天地之心聖賢之徳也有人之形即有仁之理此形此理皆受之父母者也知此則知人之貴而親之為大矣故曰思事親不可以不知人然而此形此理父母孰從而得之等而上之至于百世之前不知其所始也等而下之至于百世之下不知其所終也是孰為之哉此即天地生物之心流行而不已者也此仁之大本也故曰思知人不可以不知天此中庸之言道所以必自天命之性言之也天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達徳也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也道總言之也仁人心也隠心而發為仁仁之所行為義仁義之節文為禮知仁義禮之所從來為智皆本于仁故曰脩道以仁求仁必以智故事親必本于知人知天知人者知人道之不得不然也費也知天者知人道之不能不然也隠也尊賢為大則足以取人矣禮所生也則足以為政矣政而本于仁費而隠也仁而推于義與禮隠而費也子曰好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以脩身知所以脩身則知所以治人知所以治人則知所以治天下國家矣思脩身思事親思知人三思皆求之也知斯三者知所以脩身知所以治人知所以治天下國家四知皆得之也求之者自費而隠得之者自隠而費凡為天下國家有九經曰脩身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔遠人也懐諸侯也脩身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔遠人則四方歸之懐諸侯則天下畏之齊明盛服非禮不動所以脩身也去䜛遠色賤貨而貴徳所以勸賢也尊其位重其禄同其好惡所以勸親親也官盛任使所以勸大臣也忠信重禄所以勸士也時使薄歛所以勸百姓也日省月試既禀稱事所以勸百工也送往迎來嘉善而矜不能所以柔遠人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懐諸侯也凡為天下國家有九經所以行之者一也道立則為之基址也不惑然後講之明矣不惑者我不惑也不眩者人不眩也齊明盛服内外交脩也讒也色也貨也三者害徳之具也三者不去有徳者不可得而貴也聽公伯寮受女樂用田賦則夫子之道廢矣賢也親也大臣也士也民也工也皆言勸者皆同舟共濟之人必有以興起其歡心而後可也孝經孝治章言治天下治國治家皆欲得人之歡心即此意也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮言易屈故曰跲事為之難故曰困行歉于心故曰疚道不通故曰窮跲躓也猶今言跌倒也言可立則不跲事有成則不困行無疵則不疚道可行則不窮不言誠而曰豫者教人素學之也知之素明行之素熟而後出之則不窮矣自事豫以上言政自事豫以下言學政主費學主隠也在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣君臣之道得必始于朋友之信朋友之道得必始于父子之悦父子之道得必始于反身之誠誠身之道得必始于心之明不言夫婦兄弟者妻子好合兄弟和樂則父母其順矣皆齊家之事也誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也博學之審問之慎思之明辨之篤行之有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之己百之人十能之己千之果能此道矣雖愚必明雖柔必强學所未能問所未知思其所以然辨其所不然行其所當然學之于古問之于今思之欲其契于心也辨之欲其合于道也行之則為我有矣學而又問則取于人者詳思而又辨則求于心者精如是而後可以行矣自誠明謂之性自明誠謂之教誠則明矣明則誠矣此章總費而隠之義而極言之使學者循智仁勇之三等而用其知行之力以㑹于至一之地自首章而下大意皆總于此章文武之政費矣而在于脩道以仁仁卒本于知天天下之達道五費矣而行之者三三卒歸于一天下國家有九經費矣而必本于凡事之素定素定之目費矣而必本于誠身明善此皆發明費而隠之義也然所以用力于隠者則不外于知之行之而知行之等差則性與教而已知者生知安行天之道也此之謂性仁者學知利行勇者困而知行皆人之道也此之謂教教則有脩為之功擇善所以知之也固執所以行之也學問思辨擇善之目也篤行固執之目也皆仁者之事也五弗措百之千之雖愚必明雖柔必强皆勇者之事也然及其己至于強與明則一而己一者何也曰誠誠者中和之實理也實知之謂之明實行之謂之誠已至于實則無二矣故曰誠則明矣明則誠矣自此以下迭言天道人道而皆歸于一然其言變化之神積累之盛外之發越内之精微讀其文者可畏可慕則亦費已故末章復自其用力之隠者言之起于戒懼慎獨以至于不可形容之地自人之道至于天之道自脩道之教至于天命之性而一篇之義終焉此章三段第一段言文武之政歸于知人知天此總論大意言政之必本于學也第二段言達道五歸于知仁勇則其綱序始詳盖達道五即政之綱也智仁勇即學之序也第三段言九經歸于學問思辨行則其條目極其詳矣九經即政之條目也學問思辨行即學之條目也而聖人修道之教備矣自此以下子思之言不過贊歎聖賢之事而敷暢之耳按家語自哀公問政至雖柔必強為一章自誠明謂之性自明誠謂之教誠則明矣明則誠矣此四句是子思之言結此一章之意以起下文至誠有誠之説也自首章至此亦是大三段第一段自天命之性至唯聖者能之亦是總説大意言天道性命之理在于人之知行也第二叚自君子之道費而隠至其如示諸掌乎亦是漸趨于詳言君子之道甚費無所不周人之求道甚約不外于忠恕也第三段自哀公問政至雖柔必強亦是極詳盖自性命而言道自道而言政自知行而言忠恕自忠恕而言學問思辨行其詳畧可暏矣或云自舜至囘自囘至子路問強三段也自舜之大孝至武王周公自武王周公至哀公問政亦三叚也唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化此二章上一段言性者之道可以配天下一段言教者之事可以成物至者自至致者求至之也至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神誠者自成也而道自道也誠者物之終始不誠無物是故君子誠之為貴誠者非自成己而已也所以成物也成己仁也成物知也性之徳也合外内之道也故時措之宜也此二章上一段言性者處處明白與天無間天之道也下段言教者處處篤實與人無間人之道也誠者實心道者實理後言至誠至聖也上章言至誠之道則以其性本具是道也下章分誠與道對言則盡其心以行其道也此其所以為教者之事仁者服膺而不違顔子之事也知者用其中于民舜之事也成己所以成物言自顔子而至舜也故曰成己仁也成物智也所以釋仁智之成名也子貢曰學不厭智也教不倦仁也與此不同者子貢就知行言之以知屬智以行屬仁是故顔子之仁其擇善屬智其服膺屬仁舜之智其問察屬智其執用屬仁仁之中有仁智智之中亦有仁智也夫子曰仁者安仁智者利仁意亦類此仁者安仁乃是舜之智智者利仁乃是顔子之仁也故至誠無息不息則久久則徴徴則悠遠悠遠則博厚博厚則髙明博厚所以載物也髙明所以覆物也悠久所以成物也博厚配地髙明配天悠久無疆如此者不見而章不動而變無為而成天地之道可一言而盡也其為物不貳則其生物不測天地之道博也厚也髙也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繋焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不洩萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉詩云維天之命於穆不已盖曰天之所以為天也於乎不顯文王之徳之純盖曰文王之所以為文也純亦不已大哉聖人之道洋洋乎發育萬物峻極于天優優大哉禮儀三百威儀三千待其人而後行故曰茍不至徳至道不凝焉故君子尊徳性而道問學致廣大而盡精微極髙明而道中庸温故而知新敦厚以崇禮是故居上不驕為下不倍國有道其言足以興國無道其黙足以容詩曰既明且哲以保其身其此之謂與此二章上一章言性者之道徳無窮下一章言教者之事業無窮久以時言悠遠以地言博厚以業言髙明以徳言歴時之久及物之遠故其業愈廣而徳愈崇業廣徳崇則愈能悠久始于悠久終于悠久此所謂至誠無物也無息者理也不息者人也無疆者如天地之無盡處無己時也不貳者博厚髙明悠久也不測者不見而章不動而變無為而成也章者于外變者漸入于内成則治道成矣博厚則形而下者無不體故謂之載髙明則形而上者無不達故謂之覆悠久者終始之道故謂之成純亦不已此一句解純字之義言純即是不已天之不已文王之純其實一也大哉聖人之道止至道不凝焉此自言道之費如費而隠一章專言君子之道也故君子尊徳性而道問學止其此之謂與乃言脩道之事如道不遠人而下數章致廣大盡精微極髙明道中庸皆尊徳性也温故知新敦厚崇禮皆道問學也問學之功已足以尊其徳性矣而又道問學焉即始終悠久之意也致廣大而盡精微博厚配地也極髙明而道中庸髙明配天也温故而知新敦厚以崇禮悠久無疆也性之者但言博厚髙明悠久教之者兼防其偏温故知新知之事也敦厚崇禮行之事也徳性理也問學事也廣大理也精微事也髙明理也中庸事也知新理也崇禮事也理必體乎事事必根乎理如是而後中庸之徳如是而後至誠之道不然則怪且妄矣子曰愚而好自用賤而好自專生乎今之世反古之道如此者烖及其身者也非天子不議禮不制度不考文今天下車同軌書同文行同倫雖有其位茍無其徳不敢作禮樂焉雖有其徳茍無其位亦不敢作禮樂焉子曰吾説夏禮祀不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周王天下有三重焉其寡過矣乎上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從故君子之道本諸身徴諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑質諸鬼神而無疑知天也百世以俟聖人而不惑知人也是故君子動而世為天下道行而世為天下法言而世為天下則遠之則有望近之則不厭詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽于天下者也此二章引夫子之行事以實教者之事所謂惟天下至誠為能化者其目如此仲尼祖述堯舜憲章文武上律天時下襲水土辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明萬物竝育而不相害道竝行而不相悖小徳川流大徳敦化此天地之所以為大也唯天下至聖為能聰明睿知足以有臨也寛裕温柔足以有容也發強剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天茍不固聰明聖知達天徳者其孰能知之此三章引夫子之道徳以明性者之事所謂唯天下至誠可以與天地參者其目如此前皆先言性後言教此五章先言教後言性者其極必至于此而後為至也詩云衣錦尚絅惡其文之著也故君子之道闇然而日章小人之道的然而日亡君子之道淡而不厭簡而文温而理知遠之近知風之自知微之顯可與入徳矣詩云潛雖伏矣亦孔之昭故君子内省不疚無惡于志君子之所不可及者其唯人之所不見乎詩云相在爾室尚不愧于屋漏故君子不動而敬不言而信詩曰奏假無言時靡有争是故君子不賞而民勸不怒而民威于鈇鉞詩云不顯惟徳百辟其刑之是故君子篤㳟而天下平詩云予懐明徳不大聲以色子曰聲色之于以化民末也詩曰徳輶如毛毛猶有倫上天之載無聲無臭至矣此一章自其用功于隠至發見于費者而總言之其末復歸于隠正與本篇自天命之謂性至茍不固聰明聖知達天徳者其孰能知之相對蓋以一章具一篇之義也内省于志謹其將然也不動不言謹其未然也不賞不怒誠之形著明動也篤恭而天下平動則變變則化也其所以至此者非矯飾之功皆積隠之效也非以聲色感人非有物象可喻如天之化育直以至誠不貳故其生物不測非有聲音氣臭之可尋也言形與臭者無形之至也淡而不厭無味而其味自長也簡而文無文而文自著也温而理不肅而成不嚴而治也此言道也故自隠而費言遠者指人也言風者人己之所以相感也言微者在己者也此言脩道者也故自費而隠淡而不厭不求觀美而深觀黙養情味自長此即潛雖伏矣内省不疚一章也簡而文未嘗煩擾而處事接人經緯自密此即不動而敬不言而信一章也温而理未嘗振厲而人順事治本末自舉此即不賞不怒與篤恭而天下平二章也知遠之近言平天下之本也知風之自言言動之機也知微之顯言潛雖伏矣之事也即以上章之意反覆言之耳淡而不厭即不見而章簡而文即不動而變温而理即無為而成項氏家説附録卷二
