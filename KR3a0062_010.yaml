body:
  text: 項氏家説卷十宋項安世撰説政篇商周太甲之書曰天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終成王之詩曰閔豫小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維豫小子夙夜敬止於乎皇王繼序思不忘訪豫落止率時昭考於乎悠哉朕未有艾將豫就之繼猶判渙維豫小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身敬之敬之天維顯思命不易哉無曰髙髙在上陟降厥士日監在兹維豫小子不聰敬止日就月將學有緝熙于光明佛時仔肩示我顯德行豫其懲而毖後患莫豫荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難豫又集于蓼二君慮患求教哀痛誠切如此此其所以撫商周之初定成湯武之大業也商六百年周八百年蓋由于此正如漢興之得文帝也若皆如惠帝則已矣唐則太宗自撫定之晉武帝隋文帝周世宗後皆無人故不敢望漢唐然太甲成王本皆中主乃盡心于學如此阿衡周公之功豈不大哉秦漢秦罷封建置郡縣二世而亡漢興去古未逺鑒秦之失雜用郡縣之制後世有作者猶可放也至景帝懲七國之亂中年乃詔諸侯王不得治國後二年又省徹侯之國自是之後諸侯王遂為虛爵後世因之封建之意于是盡亡矣而天下皆復為秦矣夫損其權析其地使足與郡縣相制足矣乃一舉而盡廢之用異姓為腹心視同宗如仇敵使骨肉無寸尺之地國家無蚍蜉之援此固陳勝王莽之所得侮也要知始皇景帝資皆強戾深刻強國掃地蕩盡而後快于心凡若此者其始常自快而其終常為盜賊姦雄之所快其與三代之衰展轉相扶率數百年而後失之者相去逺矣嚴安上書諫武帝征伐其中有曰今外郡之地或幾千里列城數十形束壤制帶脅諸侯非宗室之利也方是時尚未分封子弟而識者已有郡縣偏重宗藩削弱之憂矣蓋自景帝懲末流之弊而不推其本令諸侯王不得治民客寄民上無復維城之勢王氏之禍已兆于此武帝方志在張皇威武以自廣大故雖以中山王悲痛之辭嚴安明切之奏有不暇顧而王父偃一言即勇行之自是而後漢室睽孤雖開邉拓境適足為異姓之資爾惜乎武帝有慕古之心而不知考也封建府兵宜黃李郛子經言周之封建唐之府兵皆當以漢法考之乃通蓋王畿之外不盡為諸侯國時時有特封者則未封之前未必有掌其地者計王朝命吏布在四方如漢之太守縣令者固不少也但周官不明言之爾府兵止西北諸郡為多東方諸郡絶無而僅有則民兵之在郡國如漢之車騎材官者必未嘗廢也如江西宣潤劍南之兵尚可考見子經此説可謂善言古者必有以通于今矣用説二章用世者量人而立政揆俗而施化事不可求必行志不可求必伸事求必行則難為下志求必伸則難為上遇有為之世則志之可伸者多然亦無盡伸之理事之可行者多然亦無盡行之理諸葛孔明曰法孝直在必能止主上此行是孔明亦無盡伸之理也王景略許鄧羌以司隸又為之赦張蚝是景略亦無盡行之事也必求進于二子者則有不為而已伯夷伊吕是也為之而求必焉雖孔子不能觀墮成之事可知己繼世而圖治者前人立國既有法度以付後人後人世守之其心已安其俗已成世之賢者能者老成者往往相與是之矣必欲違衆庶之心變久成之俗得罪于賢能老成而為吾治治未成而國已亂矣管仲子産孔明景略劉穆之之徒皆承大亂之後因衆心之思治開荒立法之人與平時相繼者不類不可以為例也王介甫正坐學此不惟才不及諸人時亦不可也孔子之教仲弓乃是繼世為政之法先有司以明舊典赦小過以寬人情舉賢才以隆俗化賢才衆多俗化漸美法度中小小出入足可商𣙜且為國家培養賢才以俟將來之效不必急鮮明可喜之譽于吾世也漢文宣郤得繼世之體故賈生欲立制度太子欲更漢制二主皆不從止就漢法中修起皆足為治其所以異者文帝郤以風俗為急有培養人材之意于法度之中亦時有出入以伸臣下之氣故武宣之世用其人才不盡宣帝一味挫折人才獨守死法更不與後世子孫為長久之計故身死而國衰宣帝之治雖無紛更之失而其中有鮮明可喜之意與紛更者同弊于急功也説學篇讀王回深甫文集四章三黜賦序曰今之州掾縣佐似士師而不似抱關擊柝也安世曰此言可以為從事者之針答曽子固書曰人生一世誰能獨佚但當明其不可息之説而勉我之倦則所遇無險易而安矣又答王補之書曰承諭尚留谷陽米鹽屑屑固妨詩書之樂然間在里巷又豈能獨脫于米鹽即吾輩所學要之物來可應而心官無纍則幾于道德之歸矣安世曰此言可以為厭事者之針答空季書曰人生秉命而遊于百年厯觀古今所逢無治亂所託無出處禍福之來無不有命或者乃欲以區區之力勝之故有邀福而福愈去避禍而禍愈來蓋自然之禍福常伏于萬物之間逆理而得之故于人謀為可憾也何則義盡于己而命定于天故也安世曰此言可以為任智者之針謹微賦序曰顧恃于不可見之德而不謹于可見之行吾恐子志未白而效者已成俗矣嫌戒説曰夫嫌疑者豈有其實然我以為嫌疑之謂也我以為嫌疑則人必有嫌疑者矣然而世多忽焉而不戒者何也恃其情不至于是也情不至于是而迹至于是有人焉伺間躡蹤而議之則奚説而可解歟其亦受之而已矣安世曰此言可以為任情者之針自警雜説十五章為政者必使人有餘力財力心氣皆然處事者必驗之心自心不安則人心不服人心不服則己不得安讀書觀物必盡用以治己則不枉用力兢兢堯也業業舜也孜孜禹也栗栗湯也翼翼文王也此五戒而能勉者也一經之義總挈于此五句此百聖相傳之心法不泄邇不忘逺武王也仰而思之夜以繼日幸而得之坐以待旦周公也發憤忘食樂以忘憂不知老之將至孔子也既竭吾才欲罷不能顔子也死而後已曽子也不可須臾離子思也有終身之憂孟子也三聖四賢垂範如此學者舍是將安師乎天之所命我之所性平正廣大潔靜流利本無不該亦無不通人常于無事時昏昧之道之所以不明有事時差失之道之所以不行間邪懼其昏也修辭懼其差也辭最先發開口即差凡此皆以敬為主義固在其中矣然義衆多差舛非一不可以兀坐而徒得也必須博學精思逺觀近察使于事物之理周遍浹洽理無疑情則所存者愈不昏德自然可久事無鑿智則所行者愈不差業自然可大此集義之極功也而敬未嘗不為之主就敬言之間邪屬敬修辭屬義就義言之可久屬敬可大屬義性命之理有一則有二體用未嘗相離也范文正公與提點書曰青春何苦多病豈不以攝生為意門户才起立宗族未受賜有文學稱亦未為國家用豈肯循常人之情輕其身汨其志哉又與直講三哥書曰京師交遊慎于髙議不同當言之地且溫習文字清心潔行以自樹立平生之稱當見大節不必竊論直取小名招大悔矣朱內翰易傳觀上九曰聰明深察而近于死者好譏議人也辨博閎逺而危其身者發人之過也胡武平與人言必思而後對故其蒞宦臨事慎重不妄發發亦不可回止而其趣要歸于仁厚杜祁公聽獄訟雖明敏而考核愈精李及知杭州市白集一部乃為終身之恨見蔡君謨書張乖崖鎮蜀當遨遊時士女環左右終三年未嘗回顧歐陽世則所居官舍未嘗窺園圃果爛墮地家人無敢取者見大居士集杜祁公為人潔亷自克勤靜纎謹而有法至考其大節偉如也司馬文正公書曰光視地然後敢行頓足然後敢立諫爭天子必有諫官今世牧守遂無諫者天子不得自行一事而牧守皆擅喜怒無敢間者録事參軍自漢至唐専掌彈劾此職可復修也沈煥叔晦説吾儕改過樂善之意不素明白異時年長官髙則人皆敬而逺之置之度外誰復與吾切磋者今略計一嵗中逆耳之言至于吾耳者有幾可不懼哉父有爭子何以謂之爭事父母幾諫見志不從又敬不違勞而不怨此爭子之法也禮曰與其得罪於鄉黨州閭寧熟諫事之至此者亦鮮矣楊簡敬仲説知行朱先生謂孫應時季和曰明善誠身正當表裏相助不可彼此相待行之不力而歸咎于知之不明知之不明而歸咎于行之不力則因循擔閣無有進步之期矣心迹説世固有諧俗之人更練物情諳曉世故其處事接物精密委曲若皆中節而不可與入堯舜之道者其處事與用心二也君子之心一而已矣事與心二則事雖合節心實為人為人者小謹可飾而大節不可強也心與事一則隱顯小大惟所遇之是以聖門貴聞道而君子欲其自得之也過説蜀人校書郎王叔簡謂項子曰人之過有可見者有不可見者可見者真也其為惡也小不可見者偽也其為惡也大時王方欲趨裝赴闕項子應之曰是不可以口舌爭也校書歸朝宜上奏曰強盜白晝殺人而奪之財真也而法處以死竊盜夜動而晝伏偽也而無死者焉臣以為宜察使竊盜處死而強盜蒙貸不亦可乎時在成都茶馬司共飲坐客粲然命説李泌曰主相造命不當言命豫以為不知命不可以為宰相韓魏公惟知命故敢任國家顧託之事寇萊公惟知命故敢任澶淵親征之舉裴垍惟知命故能勸諫官言事房杜惟知命故能持衆美效之君若不知命則畏死生決不敢任天下之事不知命則畏異己者決不敢來天下之言不知命則畏軋己者決不敢引用天下之士殊不知宰相職代天工位應台斗此豈一事一言所能搖撼傾奪之物哉使李林甫不妬賢嫉能亦須十九年作宰相秦太師死四十年矣竟未有坐廟堂而為太師者然後知向者遮邏中傷之為謬也一飲一啄猶不可徼俸而得豈有巍巍堂堂天子大臣而左窺右防日恐一夫從旁徼幸而取之者耶故曰不知命不可以為宰相天人説或問子言天人之一何以驗之曰天能生君子而不能使君子之亡人國也天能生小人而不能使小人興人國也天能為暄風遲日而不能使暄風遲日之殺萬物也天能為淒風苦雨而不能使淒風苦雨之生萬物也茍皆天也其不使暄風之殺之淒風之生之何也曰理不可也夫生殺興亡之必以理則人之道也孰謂循理者非事天乎故出有命在天之言者聖人斷之以絶天之罪其驗明矣項氏家説卷十
