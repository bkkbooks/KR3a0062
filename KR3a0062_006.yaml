body:
  text: 項氏家說卷六宋項安世撰說經篇六朝覲朝以行禮覲以獻功行禮則異等衰辨儀物盛朝㑹之禮以示衆庶故君於外而立臣分班而見也獻功則面南而聽治北面而致之故受之於内而一其向也朝者正禮之名覲主於見而已或以明堂位天子當依而諸侯分班遂疑曲禮為夏商所作此漢儒遁辭也明堂位之辭不可盡信但亦當存之以備參攷爾王制王制之言爵祿取於孟子其言巡守取於虞書其言嵗三田及大司徒大司馬大司空三官則皆取於公羊氏其言諸侯朝聘之節則取於左氏其餘必皆有所授蓋文帝合漢初今文博士之傳斟酌增損共為一書將以興王制致太平者其說自應與古文諸書不合鄭康成無䇿以通之强為之說曰此殷制也自是凡不可通者皆以此語斷之豈非遁辭也哉祫禘一嵗四祭春曰祠夏曰禴秋曰嘗冬曰烝所以待未毁廟之主自天子至於庶人皆得用之獨無田者謂之薦爾三嵗一祭曰祫所以待旣毁廟之主自天子至於大夫用之以其有太祖之廟可以藏毁廟之主也五嵗一祭曰禘所以報其繼天受形之祖則惟天子獨得用之蓋自其祖而上之至於天地之初賦形之始繼天而生者禮至於此不可復加非有天下者其孰得而行之哉祫祭之禮太祖之獨東向者何為祫祭設也祭之有祫者何為毁廟之主設也凡廟室之户皆南向而其主皆東向自天子至於士自七廟至於一廟凡廟之主無不東向者蓋不獨太祖為然也惟祫也合羣廟之主而坐於太祖之室前堂上則其勢不可以皆東向於是惟太祖一位東向而餘皆南向北向坐於其次所以便合食稱事宜而非宗廟設主之常禮也故曰太祖之獨東向者為祫祭設也凡宗廟之制自天子至於士皆有定數數溢則廟毁廟毁則祭不行其始也一嵗不祭猶之可也再不祭則思之矣三不祭則子孫之心有不忍焉然其室旣毁則雖有欲祭之心亦無所設為其主之蔵於太祖之夾室也於是即太祖之室前堂上出其主而竝享之使未毁廟之主皆列於其下以復其尊之舊每三嵗而一行之所以教子孫尊祖念逺示無終絶之理也故曰祭之有祫為毁廟之主設也凡東向與祫之義其本蓋如此爾而世之儒生乃用漢人自為祖之法據東向之尊以郤毁廟之主而欲以擬周人之祫祭則可謂不知本之甚矣昔者湯武之有天下也不敢自以為尊而推本於逺祖之稷契而為之廟故自稷契而下毁廟之主皆得以合食於前而其禮無所不便此祫祭之所以可行東向之所以可居也自秦人初并天下以為位自我始而無與於祖先也漢人因之遂自為太祖而父祖髙曽皆不得與我共食則祫祭之亡久矣尚何東向不東向之足議乎然而在漢人之說猶可行也彼自以為漢祖當東向不當有先漢天子當尊不當有父祖故自太公以上皆不列扵太廟非太廟則無毁廟之主非毁廟之主則不得預於祫祭之儀故在其時雖獨東向猶可行也至魏晉以來則不然矣有天下者皆行追王之禮立四親之室以為太廟其廟之號為祖其主之號為帝則比之漢人既列於廟矣有列則有毁有毁則有祫祫則必祭凡毁廟之主可也而其始為天子者猶用漢法以己為祖而不以祖為祖於是四親之廟迭毁之後皆無所置之以蔵主則無其室以祫食則無其位盡出其髙曽祖父於他所而獨留其子孫於夾室與之共食而曰此三代之祫祭也此太祖東向之禮也雖甚無禮者知其不可行矣子孫雖桀紂幽厲以其嘗為天子皆得與我合食父祖髙曽雖有隱徳餘慶以其本無名位不得與我合食是直以富貴為去取爾豈所謂報本反始之義哉是故用漢人自為祖之法則不可以行周人祫祭之禮行周人祫祭之禮則不可以用漢人自為祖之法是二者如緇之與素薰之與蕕决不可同年而語也八政飲食衣服度量數制六者易明獨事為異别注不能通事為者冢宰之九職司徒之十二事考工之六職皆司徒所頒以任民者也異别者司徒五地之常職方九土之宜王制中國四夷之俗皆司空所辨以居民者也律中太蔟劉原父曰黄鍾子位北方當一陽生之月故水數一黄鍾下生林鍾未位南方當二陰生之月故火數二林鍾上生太蔟寅位東方當三陽生之月故木數三太蔟下生南吕酉位西方當四陰生之月故金數四南吕上生姑洗辰位東南當五陽生之月故土數五此皆自然之數也羣鳥養羞月令仲秋之月羣鳥養羞說者惑之作夏小正者又以為丹鳥羞白鳥愈滋甚惑羣鳥至秋與百穀俱成人始取之以為養羞如雉鷃鳲鳩雁鶩今人皆至秋食之周禮司裘仲秋行羽物以賜羣臣此於古有證矣或疑此皆天候不言人事則孟秋農乃登穀亦以人事為一候也鷹祭鳥於孟秋之第四候則人羞之於仲秋之第三候不亦可乎皆從其朔禮運從其初從其朔注皆以為初安世謂初者天地形氣之始也朔者隨時制作之始也如厯家太初及中朔之類詳本章事理可見陳其犧牲至是謂大祥海陵查許國五經小傳曰陳其犧牲至承天之祜於時未祭也知其必受福爾作其祝號至是謂合莫蓋當朝踐之節退而合亨以下蓋當饋食之節政禮禮運曰夫政必本於天又曰夫禮必本於天其言政以郊社祖廟山川五祀為殽以降命其言禮亦以郊社祖廟山川五祀為其降曰命蓋古之言政者必合於禮言禮者必關於政如此後世政在俗吏禮在書生遂不可復合哀哉貪儉用人之仁去其貪表記曰儉近仁貪儉之與仁宜不相似而古人以同類處之者則以其皆出於愛也愛則儉儉則貪矣項羽涕泣分飲食亦仁人一節也至戰勝而不與人功得地而不與人利則儉與貪見矣儉者約於己故猶為近仁貪則加於人故不得不去孟子曰儉者不奪人奪人焉得為儉則當時之若固有儉而貪者矣魏人儉嗇褊急而有伐檀碩䑕之刺亦此類歟播五行於四時按下文五行四時以配五聲六律五色六章五味六和此所謂播五行於四時而月生者正謂布五干扵六支為三十日而晦朔一周也故曰是以三五而盈三五而闕明言五六三十無可疑矣五陽干加六陽支為三十日五陰干加六陰支亦為三十日陰陽各當三十故不言十與十二但言五六凡五聲六律五色六章五味六和皆然干言五行者甲乙屬木丙丁屬火戊己屬土庚辛屬金壬癸屬水也支言四時者寅卯辰屬春己午未屬夏申酉戌屬秋亥子丑屬冬下文曰五行之動迭相竭也注曰竭謂相負戴也正謂支干相加也又曰五行四時十二月還相為本也正謂十干周旋於十二支以成六十日也故仁者天地之心也何謂天地之心曰仁而已矣天地之至仁寓之於人纔有人形即有仁心故曰仁者人也又曰仁人心也又曰仁者天地之心也復所以能見天地之心者以其有生意也凡果實之心皆名曰人字亦作仁故天地之心亦名曰人人之名蓋出於此卜筮瞽侑皆在左右古之聖王豈溺於滛瞽者哉誠見夫顯微之無間天人之合一視聽言動之變即風雨寒燠之源故攷驗占察如此其密也詩曰文王陟降在帝左右此之謂也又曰昊天曰明及爾出王昊天曰旦及爾游衍譏厲王之不察也夫禮必本於天動而之地記曰夫禮必本於太一分而為天地又曰夫禮必本于天動而之地二者異乎不異曰不異氣始於天形生于地而天與地即太一之所分也古之人懼人之外天地而求太一也故曰本太一也分之則為天地見一之有兩也又曰本於天動而之地見兩之本一也動以形見言之非圓動方靜之動也禮時為大至稱次之時者天地之大運順者人道之大倫體者其支體宜者其義理稱者其度數五者自綦大至綦細也有經而等也經謂不變等謂同也禮以變為文以不同為節同而不變謂若父母之喪自天子達於庶人皆一等是也此章凡九條皆以反對為文獨經而等無反對者此外八條皆變而不同即此一條之反對也先儒以順而討為對非也順而討自與順而摭為對脱簡誤在章末耳討去也摭取也順而去謂自上而下每等減去以去為順此以多為貴者也順而取謂自上而下每等取加以加為順此以少為貴者也取猶君取一臣取二之取天子存二代之後郊特牲曰天子存二代之後猶尊賢也尊賢不過二代非也果尊賢何可限也世變不過三忠質文是也彼存其二而吾行其一則二變備矣其天子之禮物與今同者固不假存亦不可存也禮之必變何也曰天運人情物俗至此皆變義不得不從之而變也變之必三何也曰始而野中而法終而文天地之常禮也凡一日一嵗一物一人一家一國皆然其終也必復始焉一固不得不至於三而三亦不得不復歸於一也然則蘇子所謂天下之勢日趨於文無復忠之理者奈何曰是未嘗實察世變而姑騁其辭以蓋之爾蘇子之家其祖雖生扵三代之後何嘗不樸至明允而質具至瞻與由而文極矣若如其言其後子孫之文又當復出其上百世之後不知文章當至何地此不待辨而明者勿論可也其實秦漢以後無周孔以承其變各因其世自為文質若擬之於古山野則有之吾未見其文也不友無禮于介婦注云衆婦無禮則冢婦不友之也此于義不安當連上下文讀之上文云舅姑使冢婦毋怠不友無禮于介婦言舅姑若任使冢婦冢婦毋得以尊自怠而陵辱衆婦令其代己也不友謂煩虐之無禮謂麾叱之怠也不友也無禮也三者皆當以毋字統之下文云舅姑若使介婦毋敢敵耦于冢婦不敢竝行不敢竝命不敢竝坐亦謂不得恃舅姑之使令而傲冢婦也兩節皆主使令言之朝日蔡邕獨斷曰天子父事天母事地兄事日姊事月故春分朝日秋分夕月也皮弁視朝沙隨程迥曰先儒相傳謂前旒蔽明黈纊塞聰亦沿習之誤此獨祭祀之衮冕為然欲其專精誠以享神也若視朝則皮弁服何旒纊之有哉王者禘其祖之所自出以其祖配之禘其祖之所自出必以其祖配之者以其無名字不知其誰何也無名字者必以有名字者配之猶祭天帝者必以人帝配之使有依也不以卑臨尊也追王太王亶父王季歴文王昌不以卑臨尊也此說非也父為士子為大夫葬以士祭以大夫父子祖孫之間豈以名位為尊卑若謂周人如此則后稷何以止稱虞朝之官公劉何以止稱商人之爵后稷為太祖成王以郊禮事之孰謂不以卑臨尊耶父尊子卑祖尊孫卑久矣豈區區之稱號所能相臨耶然則追王何義也曰義當追王也周之王業實起於太王去戎狄而入中華變陶穴而立宫廟商道既衰人心歸之商因其盛命之為伯奄有西土役服諸侯王季文王世修其業三分天下而有其二武王因之以得其一推本而言實始剪商肇基王迹非三王而何周公武王創為追王之禮以著三王之勲得其義矣若宗廟之祭則后稷不王不害于配天初不以是為尊卑也後世惟司馬晉與周相類懿師昭相繼開迹而炎起承之不容不追帝三世也事之邪正雖異而業之制襲則同彼謂不以諸侯之卑而臨天子者秦人忘親尚勢之說而漢儒因之遂謂茍不稱帝不可入廟此叔孫通所以不祀太公豐公於太廟也而謂武王周公為之乎惟仁人為能饗帝孝子為能饗親以人而交於神非惻怛淳至與之俱化者不能達也故曰惟仁人為能饗帝孝子為能饗親仁人之心與天地為一體孝子之心與父母為一人也至孝近乎王至弟近乎霸此祭義之文也禮記之文多若此類雖似可疑然皆古之遺言先儒口以相授其中多古之義訓不可忽也此章亦當以古訓解之古人謂事親為仁敬長為義王者以仁覆天下故至孝者近之君之道主於仁也霸者以義尊王室故至弟者近之臣之道主於敬也不曰君臣而曰王霸者極其至者而言之也王者君位之極霸者臣位之極也古之所謂霸者即伯字也諸侯之長也自孟子荀子推明王霸之辨而後學者以伯為羞故此章遂不可通殊不知孟荀所闢謂春秋時五伯爾由桓文以前案桓文原本避宋欽宗諱作威文今更正堯舜之四岳夏商之二伯文武時周召為二伯成王時太公為侯伯康王時召公畢公為二伯是亦可羞乎學者攷古不精多據後說以破前言不可不謹也一畝之宫環堵之室檀弓曰壞其室洿其宫而瀦焉詳其詞意則宫以地基言之室以屋廬言之也項氏家說卷六
