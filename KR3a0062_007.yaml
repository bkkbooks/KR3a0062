body:
  text: 項氏家説卷七宋項安世撰説經篇七曾是以為孝乎陸氏釋文曾音增則也皇侃正義音層古之音層者訓重今之音層者訓嘗皆于此章文義不協及觀徐鍇説文繫傳有作前增反者辭之舒也蓋直以為發語之辭則雖層音亦通也大車無輗小車無軏徐鍇曰乘車當中一曲轅以木為衡是縛軛于上别鑽孔縛之大車雙直轅衡軛都縛之不鑽也冉子與之粟五秉周禮儀禮米數以米斛為筥十六斛為秉禾數則以二石為秉四秉為筥蓋秉筥之字雖同而數則異也按徐鍇説文正引論語以五秉為禾數曰百二十斤為䄷二百四十斤為秉四秉為筥正與二禮同然則與之五秉為禾十䄷耳子謂仲弓曰恐此只是如子謂子貢曰之類蓋與之言耳非論仲弓也語意亦與仲弓問政章同若論仲弓則不當加曰字但當如子謂公冶長子謂南容之類而已人之生也直罔之生也幸而免列子曰由生而生常也由死而生幸也多見而識之漢書多聞而志之知之次也古文識皆音志子疾病子路請禱釋文云此章無病字按古注至子罕篇子路使門人為臣章始解病字則此有病字者非唐棣之華偏其反而豈不爾思室是逺而朱氏云偏反翩翻也按曹娥碑云曄曄之姿偏其反而令色孔儀則作翩翻也久矣孟子道性善荀卿子之攻孟子也其説曰性善則去聖王息禮義矣性惡則貴聖王興禮義矣嗟乎荀卿子此言誠乃釋老氏之學之病矣特施之孟子子思則為過耳孟子子思其于遵先王之法服禮義之教至明且習也彼荀卿子者習聞其説而未讀其書輕于立論勇于毁人而不知併其天地父母之性而自毁之也然其所謂性善則去聖王息禮義矣則足以一言而蔽釋老之學而後之儒者欲攻二氏者皆莫之及也嗟乎卿亦豪傑矣哉本荀説荀子性惡篇曰人之性惡其善者偽也凡禮義者是生于聖人之偽非生于人之性也聖人積思慮習偽故以生禮義而起法度今將以禮義積偽為人之性耶然則有曷貴堯禹曷貴君子矣哉凡所貴堯禹君子者能化性能起偽偽起而生禮義然則聖人之于禮義積偽也亦陶埏而生之也豈人之性也哉由是推之謂隆禮由義為偽其説實出荀子又非十二子篇曰略法先王而不知其統猶然而材劇志大聞見雜博猶然舒遲貌劇繁多也按往舊造説謂之五行五行仁義禮智信也甚僻違而無類幽隱而無説閉約而無解荀卿嘗言法後王治當世而孟子子思以為必行堯舜文武之道然後為治不知隨時救弊故言僻違無類按飾其辭而祗敬之曰此真先君子之言也子思唱之孟軻和之世俗之溝猶瞀儒嚾嚾然不知其所非也溝讀為講猶猶豫也瞀暗也嚾嚾喧囂之貌遂受而傳之以為仲尼子遊為兹厚于後世厚垂德厚也是則子思孟軻之罪也由是推之惡言理性讀中庸其説亦出荀子適世之有是説也作本荀説使畢戰問井地章安世妄意上章兩節皆當在畢戰章內夫世祿滕固行之矣此一句在上章辭義不倫移置下章乃與分田制祿井地榖祿君子野人之語相入又自設為庠序學校以下亦當移在下章百姓親睦之後方與人倫明于上小民親于下兩句相應且其末云子力行之亦以新子之國子謂畢戰也不當在上章明甚下章云子之君選擇而使子子必勉之又云若夫潤澤之則在君與子矣其辭義皆與此同非畢戰而何凡對大國之君稱王對齊梁是也小國之君稱君對穆公是也大夫稱子對戴不勝是也此孟子書法也熟讀當見吾言之不謬圭田古者圭田五十畝自卿以下同等今之職田因職之貴賤而為之多寡非古制也慶元丙辰在金陵見陳之純所作時議恐前輩已有此説息邪説距詖行放淫辭息者止令不作也距者止令不行也邪與偏人所共見非狷介忮忍者不能為之故止之足矣至于淫辭以放蕩無法為大方其言理若甚高而實便于俗以故能陷溺人人喜由之與邪説詖行者不同故必屏而放之不可與同中國如放鄭聲亦以其聲之淫亂人也若遁辭則唇吻反覆之士閭巷之自好者皆知恥之故待之以不足問附庸王莽封諸侯置附城削漢王蓋以城解庸也古文庸即墉字後人加土以别之不成國者謂之附城猶今言枝郡為屬城也此説卻通換字換字之法雖賢聖之文亦然蓋語勢當然非必有意也特文士推演之遂至于艱深爾以吾我二字言之先言我字則以吾繼之我以吾仁我善養吾浩然之氣是也先言吾字則以我繼之使吾二婢子夾我吾喪我是也孔子曰吾有知乎哉有鄙夫問于我豫不得視猶子也非我也此以我繼吾與豫也太宰知我乎吾少也賤二三子以我為隱乎吾無隱乎爾此以吾繼我也用韻語古人教童子多用韻語如今蒙求千字文太公家教三字訓之類欲其易記也禮記之曲禮管子之弟子職史遊之急就篇其文體皆可見古人垂訓多用韻語亦欲其易記也又文字整齊聽者易曉如大禹之訓及洪範等書可見凡官針及盤杅几杖之銘皆然古之卜筮專用韻語至今猶然易之爻辭象辭左氏傳所載繇辭史記之龜䇿傳焦氏之易林東方朔管輅射覆之辭及今之籖詞課詞皆韻語也伊訓太甲旅􅋙命語多對偶或用聲律蓋欲其分明瀏亮便于人主之聽也帝王稱宗高宗出商書中宗出周書獨世宗未知何據按列女傳謂宣王得薑后卒成中興之名為周世宗則世宗宣王之廟號也古文世與太通故太子為世子太叔為世叔樂太心為樂世心世宗即太宗也漢文帝既為太宗故武帝為世宗高帝既為太祖故光武為世祖然則周家當以武王為太宗故宣王為世宗耶春秋書居書在程迥可久曰春秋書王在畿內曰居于狄泉出王畿曰出居于鄭諸侯在境內曰公居于鄆出境曰公在乾侯唐鑑用春秋書法中宗則宜曰帝居房陵不宜曰在日月食日食必于朔月食必于望以其相當也兩不相當則不食相當而不盡正則隨其所當之深淺而食正相當則食之既相當而氣虧者食茍不虧則亦不食兵法左傳蒍敖擇楚之二廣廣有一卒卒偏之兩右轅左追蓐挾轅而戰以轅為法百官象物而動軍政不戒而備周制五伍為兩四兩為卒楚徒多而車少車之一偏有卒與兩一車之徒二百五十李以為挾轅之士一偏為五十人一兩為二十五人二廣凡一百五十人靖號知兵殆未之思也又曰鄭子元繻葛之陳為左右拒前偏後伍伍承彌縫案前偏與今左傳刋本作先偏有異前偏輕也後伍重也二拒翼也周制偏車二十五乘伍百二十乘前輕後重鱗次彌縫陳曰魚麗其衆多而備之謂乎又曰夫差陳于黃池百人以為徹行百行行頭皆官帥十行一嬖大夫十嬖大夫一將軍三軍帶甲三萬吳有徒而無車此所謂方陳也又曰申公巫臣以兩之一卒適吳舍偏兩之一教之戰陳吳之軍陳其本諸此巫臣車徒二乘以兩之強半與吳杜預以為與之兩士與九乘車何其乘車之衆也古今注物名鯉之大者曰鱣鱣之大者曰鮪鯨之雌者曰鯢螻蛄一名鼫鼠螢火一名丹良棨戟殳也以赤油韜之亦曰油戟金吾棒也御史大夫執金吾以銅為吾黃金塗兩頭守尉以木為吾用以夾車輻稻之黏者名秫禾之黏者名黍亦謂之穄以上出崔豹古今注取其切于經史者表而出之論誠敬安陽韓彰守夷陵秩滿過荆謂項子曰彰幸甚得事頤正郭先生于夷陵聞教多矣項子曰先生之言云何韓曰先生言子思但言誠而程子乃言敬敬故其弊多欺誠則不欺矣項子太息曰嗟乎是在子思之書而先生不知察耳夫誠者天之道也誠之者人之道也先生將使學者以天自居乎將使之修人道而後至于天乎若猶修之則必有事矣子思之首章曰道不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也此修道之方也誠之者人之事也人之道也名之曰敬可乎不可乎他曰夷陵張昌基來項子問之曰郭先生謂程子言敬不若子思言誠有諸張曰有之項子曰立之以為如何曰天下之至言也項子曰立之素豪士不奈程之所言敬何吾固知立之之以為至言也子以為行子之欲嗜酒好色無所矯揉而以為誠乎將樂循禮義無所勉強而以為誠乎使吾胸中樂循禮義則誠固未嘗不敬也而又何悖焉吾茍未能樂循禮義則必將戒謹不見恐懼不聞以持之齋明盛服非禮不動以修之人一己百人十己千以勉之此皆子思之説也敬乎不敬乎夫安而行之生而知之不勉不思從容中道者古固有之矣然豈後學之所可自居哉利而行之勉強而行之則非敬不可也決藩籬破繩墨而放一世于猖狂恣睢之地者必子之言夫或曰子之言敬辨矣昔元城劉先生問于司馬文正公公教以誠曰當自不妄語入然則文正之言非歟項子笑曰子亦嘗聞文正元城之風乎程子之敬猶有所謂春風和氣者焉世之人已畏而惡之矣使其立于文正元城之側見其張拱而徐趨正色而危坐則其惡言誠字當又甚于敬矣大抵茍有自恣之心則凡視聖賢之名教國家之法令以為與真情相妨也而獨敬之一字哉項子曰世人喜言任真故多借誠字以自文此不但不識誠亦不識真也以無禮法為真情此語出自莊老而乃極盛于魏晉之時大抵治世之人好禮法亂世之人樂恣睢故自戰國以來學士大夫多以禽犢自處凡仁義禮樂忠臣孝子皆以為失性害情之具此孟子所以哀其自棄自暴而發為性善之説也孟子言人之情人之才皆可以為善人之心皆有辭讓羞惡而魏晉之言真情者禮法廉恥皆不預焉惟裸飲而雜坐者為近之嗟乎孟子以堯舜為性而晉人乃以禽犢為真其自待如此尚可與之論誠乎哉論鬼神不能盡倫則佛然後聖行不慊于心則鬼然後神此説為治已者言人倫無相保之樂則民歸于佛賞罰不由于功過則民聽于神此為為政者言儒者非不知信鬼神但儒者以為當誠心謹行以事之小人以為當賄賂酒肉以結之爾儒者非不信災異但儒者以為當恐懼修省以消之小人以為當巫覡章醮以治之爾人但能以立朝事君之説還治其家則言鬼神者必不曰當用賄賂酒肉言災異者必不曰當用巫覡章醮矣凡言怪神者中國少而荆越多城市少而村野多衣冠少而小民多富室少而貧民多主人少而童僕多男子少而婦女多晝日少而暮夜多月夜少而晦夜多蓋非愚則暗也韓子作原鬼謂有降而為禍者有降而為福者有降而莫為之禍福者其説似矣而未究也項子為足之曰二氣氤氲與人相屯其狀千萬而義止于四有人先而鬼後者作善降之百祥作不善降之百殃者人召之也有鬼先而人後者國之將興必有禎祥將亡必有妖孽者鬼告之也凡此類者降而為禍福者也有人病而疑于鬼者隨五臟之病氣發為色聲形象接于見聞通于夢寐若此者疾間而止無所召也有天病而疑于人者隨五行之戾氣發為妖孽眚痾降于國野觸于人物若此者氣定而止無所告也凡此類者降而莫之為禍福者也是四者各有所從來而韓子混然言之若以為無定理而不足問者此韓子詩中所謂硬語也非真知情狀者也或曰子之言若是乎曰未也此鬼事也非人事也鬼事則知之而已人事則當有以處之處之奈何曰處人病者醫而止耳餘三者惟德足以處之方三者之始至也固莫定其為誰何也不可曰是天之病而無預于我也是誣天也又不可曰是天之所告而我無如何也是棄天也君子必悚然曰我之罪也作不善之所召也恐懼焉修省焉禍消變止而後即安故堯必憂水湯必以旱自責宣王必側身修行孔子遇迅雷風烈必變皆所以畏天命敬鬼神也故鬼神之變三而君子之道一此説明而後孝敬之行興淫巫之禍息不然但如韓子之所云者則愎而已矣其誰肯信也項氏家説卷七
