body:
  text: 項氏家說卷九宋項安世撰說事篇二晏子豫讀晏子春秋見其與叔向論士君子之出處大扺多擯處士以為當誅而自不恥于以一身而事百君夫以晏子之行既過乎儉而其于出處之際所主又如此則其為墨子之學明甚談者相承謂之墨晏豈茍然哉自公孫𢎞至馮道皆有篤行嘉言而不恥于事亂君行亂政蓋世之士大夫傳襲此派千載不絶人謂楊墨之道至孟子而止者特未之考爾李斯二世好鄭聲李斯諫曰放棄詩書極意聲色此祖伊之所惡也趙高曰五帝三王樂不相襲亦各一世之化何必華山之騄耳而後行乎二世然之嗟乎李斯亦知放棄詩書極意聲色之為可懼乎趙高今日教二世之言正李斯前日教始皇之言也斯固曰三代之事何足法也請史官非秦記皆燒之偶語詩書者棄市以古非今者族身教其父行劫而禁其子之殺人難矣李斯商鞅皆自為其術之所困然則希世以求合者亦何利哉蕭何高祖擊陳豨聞韓信已誅使使立蕭何為相國置卒五百人為相國衛召平弔之謂為帝所疑而何遂用平計悉獻家財助軍高祖乃大喜始豫讀何傳至此心亦信之及讀留侯傳則從上擊代出奇計下馬邑及立蕭何相國皆良計也然後知留侯之智其去人逺矣夫陳豨反外韓信反內高祖不在長安而何獨誅信雖幸而濟人心必大恐列侯諸將往往有反側者當是時何固甚危漢亦岌岌久矣亟拜相國以重鎮之又為之兵衛使奸宄讋焉此高祖留侯之廟算也何固默識之矣得召平之說遂因而用之以泯其迹衆人固不識也曹參太史公曹參贊謂參所以能功多若此者以與淮陰俱其意蓋少參也豫觀參自起沛專以戰多受賞從中涓十遷至假左丞相皆以戰得之戰大小不可勝記其從韓信攻魏趙齊乃在為左丞相後要之高祖諸將善戰無逾曹參者故常遣副韓信示漢未嘗無人又因以監之是信以參而安非參以信而重也然則參之武代豈可少耶周昌漢高祖欲立趙王而廢太子周昌期期以為不可太子之不廢昌實有力焉使庸主處此必以昌為太子之黨則當與趙王為仇矣而高祖求可屬趙王者惟昌為當其意且自御史大夫左遷之使任其事夫欲託以子而必使其仇又降其所居官此皆常情之所不敢用也而高帝行之昌卒亦不負其意何哉夫能犯人主之怒而扶天下之正義者此其人必不以死生變其節以官職動其心此固昌之所以為可託也然則髙帝知人之鑒真不可及哉周勃衛青周勃有安劉氏之功不能以自免徒以益封拜賜皆與薄昭于是得出獄戶衛青有椒房之親不能以自固以五百金為王夫人親壽遂保終身之寵夫文帝漢之賢君後世罕儷焉武帝號為雄才大略能駕馭臣下者而為二帝臣者功臣必賂外戚外戚必賂嬖御人而後得以免誅而受賞則桓靈之將以無賂而不侯肅代之後軍中皆除債帥何足異哉大率英雄之主恃其資而不濟以學欲以一己之聰明而盡天下之情僞適足以增左右近密之勢而己惟明德內融而不恃察以為明者為能免于此夫衛青霍去病昔常怪司馬子長論衛霍意皆不甚與之以為與伍被之說太不相似及觀寧乘說大將軍曰將軍所以功未甚多身食萬戶三子皆為侯者徒以皇后故也青從其教而上亦是之則青之自許與當時之許青者如此而已凡青去病之出上輒以精兵大衆與之且為之度地而移軍其他老將皆故減其兵左其道使不得立功以曲成青去病之賞蓋人主之所欲富貴無不可者而李廣父子區區用其材力與造化者爭勝負之命可不哀哉何去非曰天之所與不可强而甚高者材也性之所授不可習而甚明者智也以天下無可强之材可習之智則凡材智有以大過于人者皆天之所以私被之也夫天下之事莫神于兵天下之能莫巧于戰以其神也故溫恭信厚盛德之君子有所不能知惟其巧也而桀惡欺譎不羈之小人常有以獨辦由是觀之凡材智之高明而自得于兵之妙用皆天之所資也昔者漢之有事于胸奴也甚久世家宿將交于塞下而衛青起于賤隸去病奮于驕童轉戰萬里無嚮不克聲威功烈震于天下雖古之名將無以過之二人者之能豈出于素習耶亦天之所資也是以漢武欲教去病以孫吳之書乃曰顧方略何如耳不至學古兵法信哉兵之不可以法傳也昔之人無言焉而去病發之此足知其為曉兵矣非以兵可以無法而人可無學也蓋兵未嘗不出于法而法未嘗能盡于兵以其必出于法故人不可以不學然法之所得而傳者其粗也以其不盡于兵故人不可以專守蓋法之無得而傳者其妙也法有定論而兵無常形一日之內一陳之間離合取舍其變無窮一移瞳瞬目而兵形易矣守一定之書以應無窮之敵則勝負之數戾矣是以古之善為兵者不以法為守而以法為用常能緣法而生法與夫離法而會法順求之于古而逆施之于今仰取之以人而俯變之以己人以之死而我以之生人以之敗而我以之勝視之若拙而卒為工察之若愚而適為智運奇合變既勝而不以語人則人亦莫知其所以然者此去病之不求深學而自顧方略之何如也歸師勿遏曹公所以敗張繡也皇甫嵩犯之而破王國窮冦勿迫趙充國所以緩先零也唐太宗犯之而降薛仁杲百里而爭利者蹶上將孫臏所以殺龐涓也趙奢犯之而破秦軍虞詡犯之而破叛羌强而避之周亞夫所以不擊吳軍之鋒也光武犯之而破尋邑石勒犯之而敗箕淡兵少而勢分者敗黥布所以覆楚軍也曹公用之拒袁紹而斬顔良臨敵而易將者危騎劫所以喪燕師也秦君用之將白起而破趙括薛公䇿黥布以三計知其必棄上中而用其下賈詡䇿張繡以精兵追退軍而敗以敗軍擊勝卒而勝宋武先料譙縱備我之出其不意然後攻彼之所不意李光弼暫出野次忽焉而歸即降思明之二將凡此者皆非法之所得膠而書之所能教也然而善者用之其巧如此是果不在乎祖其緒餘而專守也趙括之能讀其父書詳矣而藺相如謂徒能讀之而不知合變也故于其論兵雖父奢而無以難之然奢不以為善而逆知其必敗趙軍者以書之無益于括而妙之在我者不特非書之所不能傳而亦非吾心之能逆定于未戰之日也昔者以兵為書者無若孫武武之所可以教人者備矣其所不可者雖武亦無得而豫言之而惟人之所自求也故其言曰兵家之勝不可先傳又曰奇正之變不可勝窮又曰人皆知我所勝之形而莫知其所以制勝之形故其戰勝不可復而應形于無窮善學武者因諸此而自求之乃所謂方略也去病之不求深學者亦在乎此而已嗟乎執孫吳之遺以程人之空言求合乎所以教而不求其所不可教乃因謂之善者亦已妄矣讀徐幹中論豫讀徐幹中論至考僞遣交二篇釋然而笑曰前篇蓋詆郭林宗之徒周行郡國訓掖後學後篇蓋詆徐孺子之徒游學四方千里㑹葬者也然以諸賢皆前世所重故但歷述其行而不敢正出其名且言是人之生也人抃手而贊之揚聲而和之及其死也又論其遺烈而恨己不逮則其為林宗諸人明矣其終篇以為此皆聖人之所禁春秋之所誅奸亂盜賊之人也嗟夫士生末世為富貴所誘禍難所迫雖博聞自好之士其所議論悖謬至此况餘人乎幹雅為魏氏父子兄弟所敬想見當時人士講說大率類此故魏氏之興卒變節義而為通人則幹之所願亦已行矣豫于是知東都黨錮之後漢祚未亡之時學者又有此一等訿名毁學虧節壞教之議論也其後何晏夏侯𤣥嵇康吕安之徒相繼誅死雖才識器度優劣不同然大要皆建立名行表核清濁正幹等議論之所不赦也略而言之互有長短諸人所為誠新國之所不便如幹等所言亦豈舊君之所便也哉應劭應劭風俗通義劭之辨訛正俗據經守理賢于徐幹逺矣至論漢之人物則意與幹同以韓稜陰助太守為當禁錮終身以皇甫規上書入黨為當伏大辟至謂范滂杜密徐稚郅憚皆為罪人大抵文士爭名自古而然辨博文雅之人自以為當世師表而海內之士乃皆尊名節如水赴壑心所不平固應出此曾不思使已得志盡逮名士論以大辟則曹節王甫何其幸哉誅名士以助宦官為後世之龜鑑則有之矣未見其可為當世之師表也士君子之用心可不謹哉諸葛亮諸葛亮所師事者龐德翁司馬德操所友者徐元直崔州平孟公威石廣元皆天下奇士也獨幸孔明遇合故六人者之名猶在後世然抱負之竒則既寂寥簡短無所著見矣使孔明亦不遇則其磨滅又不止此世豈知有英霸之略伊吕之事哉由此言之才士德人充滿天地世之浮沈閭里與常人混者皆不可以淺近量也論語所謂封人荷蕢晨門荷蓧世皆不知其名微生接輿長沮桀溺虞仲夷逸朱張少連周之八士事迹皆不可考悠悠古今可勝計哉然則謂人之性惡者誠妄論也荀文若劉穆之荀文若崎嶇一世使曹公化家為國以一語之稽飲藥而卒而董昭為魏佐命劉穆之自徒步崛起為劉裕謀臣兼居鎮撫之任蓋良平蕭曹合而為一人可謂勳且勞矣以一議之遲卒以憂死而傅亮為宋元臣以此見亂臣賊子其設心措慮惟在拏攫常以賊心待人惟恐一日為善攫者所先故謀雖工而攫遲者則以為負己謀雖謬而攫速者則以為恩己故謀者常死而攫者常貴然而謀之不工則攫而不可得是則謀之工者身之禍而人之福也彼懷其智能而為亂臣賊子謀者亦何利哉王威景威三國時曹公兵至襄陽蒯越等勸劉琮降王威說琮曰曹操得將軍既降劉備已走必懈弛無備輕行單進若給威竒兵數千徼之于險操可獲也琮不納如宋初慕容釗兵至襄陽孫光憲勸高繼沖降大將景威說繼沖請兵三千人于荆門道中險阻處設伏候其夜發伏攻之孫光憲止之景威扼吭而死此二事正相類要之二將之謀豈有補于成敗之數哉特其志足嘉爾陶士行陶士行平生報國忠順勤勞晚節脫屣八州本末明白固與王茂宏角巾之空言謝安石新城之耄䇿相去逺矣況其下者乎徒以躬行事實惡疾浮虛遂為俗子誣以不根之言史氏無識亦從而録之今其說曰侃嘗夢入天門九重至第八重折翼而墜及督八州據上流潛有窺窬之志每思折翼之祥自抑而止夫謂之夢則非他人之所預也謂之志則非他人之所知也謂之潛則未嘗形于言也人何以知其為有謂之思則未嘗動于迹也人何以得其每思之數謂之自抑而止則未嘗揚也人何以知其為抑未嘗作也人何以知其為止豫悲夫士行之有豐功實行忠節高情而遇庸史官負謗至今故為一辨之唐太宗家法太宗殺兄及弟自以為學周公也及殺其子十人則不學周公而學蕭鸞矣至納元吉之妻與廬江之妾及以廬江家口賜其臣充賞則又全學高洋房杜諸人烏得無罪唐太宗葬法唐高祖之喪務從隆厚虞世南上疏恐纍死者今雖不藏金玉後世但見丘壟如此其大安知其中無可欲者願依白虎通為三仞之墳仍刻石陵旁書藏宗廟為子孫永久之法太宗初不報也及葬皇后于昭陵乃為文刻石稱用遺言因山薄葬不藏金玉庶幾奸盜息心存沒無纍使百世子孫奉以為法太宗曾不動心于其父而其為妻慮者乃如此其至非不孝而何房杜人皆以房杜比蕭曹雖太宗每以此許之然房杜開國之初未嘗有功與蕭曹冦鄧不同及後來在秦府謀殺隱巢乃是二人之䇿故太宗感之最深異時作相卻有薦進人才修整法度之功若議論之間則多是無理項氏家說卷九
