body:
  text: 項氏家說卷八宋項安世撰說事篇一離騷楚語伍舉曰德義不行則邇者騷離而逺者距違韋昭注曰騷愁也離畔也蓋楚人之語自古如此屈原離騷必是以離畔為愁而賦之其後詞人倣之作畔牢愁蓋如此矣畔謂散去非必叛亂也九歌按澧陽志五通神出屈原九歌今澧之巫祝呼其父曰太一其子曰雲霄五郎山魈五郎即東皇太一雲中君山鬼之號也劉禹錫論武陵之俗亦曰好事鬼神與此正合且九歌多言澧陽澧浦則其說蓋可信矣漢谷永言楚懷王隆祭祀事鬼神欲以獲福助卻秦師而兵破地削身辱國危則原之九歌蓋為是作歟節序說俗言端午為屈原七夕為女牛皆附㑹之說也大率人情每兩月必一聚㑹而月必用陽日必重之此古人因人情而立教示尊陽也是故正月則用一日三月則用重三五月則用重五七月則用重七九月則用重九皆取陽月陽日獨十一月用冬至蓋陽生之日亦重陽也書之正月上日與月正元日皆正月一日之名也詩之溱洧秉蕑論語之暮春浴沂皆重三祓禊之俗也然則節序之立古矣招魂招魂曰帝告巫陽曰有人在下我欲輔之魂魄離散汝筮豫之此四句帝命也巫陽對曰掌夢上帝其命難從此二句巫陽對也若必筮豫之恐後之此二句又帝命也謝不能此三字又巫陽對也復用巫陽焉此一句又帝命也此章舊注不通故為正之蓋掌夢之官能占人精神所在帝欲急還其魂故併命巫陽曰汝必自筮而自豫之茍待掌夢則恐不及事此殆作者之本意云戰國䇿戰國䇿辨士之所作也故其書尚說而貴客戰國䇿目録序舊缺十一篇南豐訪得之而三十三篇者復完且謂此書言詐之便而蔽其愚言戰之善而諱其敗有利焉而不勝其害有得焉而不勝其失亦名言也漢初即位之禮即位之禮有二君薨世子定位于初喪此柩前之位也如召公畢公立康王于殯宫衛彌牟扶適子就位于喪次皆所以定統緒一人心此則家老大臣之事也諸侯三年之喪畢以士禮入見王賜之命而後即諸侯之位此朝廷之位也如高宗諒隂三年而後出令太甲居憂三祀而後冕服此則嗣君之事人子之所自盡也漢景帝始短父喪可謂薄于親者然猶已葬釋服而後書太子即位于高廟又三日而後受皇帝號則猶用古者居喪稱子除喪即位之禮也其後武帝亦以葬後三日即位率以為常蓋去古未逺雖甚變之中猶有不變者存及其既逺雖有志于古者亦眩于所傳而不能自決矣州郡縣學州縣立學自秦而下莫知其所從始按華陽國志漢孝文帝末年廬江文翁為蜀郡守是時世平道治民物阜康翁乃立學選吏子弟就學于是巴漢從風亦立文學孝景帝嘉之令天下郡國皆立文學因翁倡其教蜀為之始也則郡國文學蓋始于此又益州治蜀郡文翁所立文學本在城南後漢永初後遇火復立而州奪郡文學為州學郡乃更于夷里橋南岸道東邊起文學則部刺史于所治别自立學又見于此又成都縣為蜀郡治所廣漢馮皓為令立文學學徒八百人則雖郡治所之縣亦自置學又見于此大抵部刺史所治郡凡三學曰州學曰郡學曰縣學漢去古近故置學之多如此而皆自孝文及文翁始孰謂文帝不喜儒術哉淮南子淮南子繆稱曰天有四時人有四用視而形之莫明于目聽而精之莫聰于耳耳聽其聲口言其誠而心致之精則萬物之化咸有極矣淮南此語必古之遺言也明月珠高誘淮南子注隨侯之珠蓋明月珠也許慎淮南子注曰夜光之珠有似明月故曰明月張衡西京賦流懸黎之夜光左思吳都賦曰隨侯于是鄙其夜光據四家之說則隨侯明月懸黎夜光一物而四名也班固西都賦曰隨侯明月錯落其間懸黎垂棘夜光在焉乃是四物非一物也詩賦嘗讀漢人之賦鋪張閎麗唐至于本朝未有及者蓋自唐以後文士之才力盡用于詩如李杜之歌行元白之唱和序事叢蔚寫物雄麗小者十餘韻大者百餘韻皆用賦體作詩此亦漢人之所未有也豫嘗謂賈誼之過秦陸機之辨亡皆賦體也大抵屈宋以前以賦為文莊周茍卿子二書體義聲律下句用字無非賦者自屈宋以後為賦而二漢特盛遂不可加唐至于宋朝復變為詩皆賦之變體也史記史記十二諸侯乃列十三國者秦後為帝作本紀矣故從世家稱十二諸侯猶六國列七國而稱六也或謂子長擯吳非也陳表而杞不表吳表而越不表皆以譜牒無傳爾二國竝有世家亦非黜之也曹世家不見于自序而附于管蔡者皆毋弟也如趙王遂附楚元王世家也伯仲季沛公兄弟蓋以伯仲季為名稱及其貴也乃獨以為字而改名曰邦爾方為亭長時何邦之云兄仲為代王遂名曰喜長兄伯不復有名父公母媼亦不加文可見古人之實也陰陽家說二章言六壬者用天官十二神以貴神之前五神騰蛇為奉車都尉朱雀為羽林軍六合為光祿大夫句陳為將軍青龍為左丞相貴神之後六神天后為後宫采女太陰為御史中丞真武為後將軍太常為太常卿白虎為廷尉天空為司直其所稱官名大抵皆用漢制又姚氏易載太一七十二局法稱雉始鳴為野雞始鳴避漢諱然則凡方技之學皆起于漢也言太乙者皆出易乾鑿度九宫之說一坎九離三震七兌二坤四巽六乾八艮即劉度所謂河圖也十神太乙皆用蹉宫移坎一于乾移艮八于坎移震三于艮移巽四于震移離九于巽移坤二于離移兌七于坤移乾六于兌凡八卦皆退一位或云地闕東南移九以鎮之或云乾統天故移一于乾皆未知其孰是也唐天寶中蘇嘉慶始奏九棊太乙法又曰九太乙天元玉策又謂之九奇太乙其法皆用正宫然則十神九棊自是二術也按其一以五將十神更治迭遊為吉凶其一以九神飛直為禍福一皆天神一皆地祗一主十二野則似是漢法一主九州則唐法也棊氣奇三字不同以天元玉策考之則其神九位之土祗又云以十神行天之九室以九奇行地之九室則所謂奇者安知非祗字術士多不知書又喜詭祕故轉為棊奇亦或然也同年兄弟進士稱同年兄弟初謂起于唐世按應劭風俗通言後漢人伍世公與段遼叔同嵗及守廣漢先舉其子後守南陽又以與蔡伯起同嵗先舉其弟皆謂同時孝廉則科目之有同年尚矣蓋漢世最重辟舉受其辟則為君臣受其察則為父子則同時共察者安得不謂之兄弟乎隱語俗間助語多與本辭相反雖言去亦曰來如歸去來之類是也雖言無亦曰在如曰沒在之類是也于口耳亦曰看如說看聽看是也于醜惡亦曰好如好醜好惡是也雖在逺外亦以為裏如曰逺裏在外裏是也雖甚愛惜亦以為殺如曰惜殺愛殺是也亦曰惜死愛死其于打字用之尤多如打疊打聽打話打請打量打睡無非打者王氏李氏栁芳唐厯言王圭曾祖神念在魏為烏桓氏仕梁為將祖梁太尉王僧辨遂為王氏至圭始為儒按此則文中子謂其上世世皆有著述者妄也又唐歷高祖卷首言唐之祖為後魏金門鎮將鎮武州因為武州人至虎為西魏柱國賜姓太野氏隋文帝作相時始復本姓為隴西李氏則唐之本系蓋可知矣按姓氏書載虎之兄曰起頭弟曰乞頭起頭之子曰達摩其名皆與太野相稱唐六典宗正寺猶有定州刺史乞頭一房則其祖涼武昭王是亦圭之祖王僧辨也史臣于圭直書本姓于唐則先曰賜姓後曰復姓蓋微而顯云姓名作對吐蕃之臣曰乞藏遮遮可對統萬之主曰赫連勃勃紹興間申屠寅字行父有聲于太學或以其姓名對少正卯聞者絶倒而行父意甚不樂申屠古司徒也其對少正尤切不獨寅與卯對也郢坊前輩詩言賜酒皆曰郢坊按唐六典言今內有郢州春酒因張去奢為刺史進其法今則取人為酒匠以供御及燕賜本語改失其意文字中有用當時本語後人不知而以他辭文之其失本意尤多如唐書改好漢為奇士五代史改一把算子為一握籌已為可病然猶未失本意也因觀宋徽宗實録見執政議立新君曰且召二王來看蓋北人之語句未多用看字本是助語而修史者遽書曰召二王來觀之如此則是執政議時初未識親王之面乃今始欲親相其貌而立之也其去本意豈不逺哉六先生年齒世有六先生圖或問其位置先後平安主人書齒序以告之康節先生邵氏熙寧十年卒年六十七濂溪先生周氏熙寧六年卒年五十七少康節六嵗涑水先生司馬氏元祐元年薨年六十八少濂溪二嵗橫渠先生張氏熙寧十年卒年五十八少涑水一嵗明道先生程氏元豐八年卒年五十四少橫渠十二嵗伊川先生程氏大觀元年卒年六十五少明道十一嵗周張二程雖尊幼之序素明不暇論年然史于孔門師生亦併記其年之多少云字說黃庭堅字魯直馬永卿懶真録以為史克魯人也嘗引十六相以卻莒僕故曰魯直此說非也若是則黃大臨亦可字魯直矣魯直二字出栁文先友記按爾雅庭直也直而且堅故字魯直臨照四方曰明故字元明朱丞相名字蓋用荆公字說于文合一為朱析而二之則為非故名勝非而字藏一皆說朱字也東坡長短句蘇公乳燕飛華屋之詞興寄最深有離騷經之遺法蓋以興君臣遇合之難一篇之中殆不止三致意焉瑤臺之夢主恩之難常也幽獨之情臣心之不變也恐西風之驚緑憂讒之深也冀君來而共泣忠愛之至也其首尾布置全類邶柏舟或者不察其意多疑末章專賦石榴似與上章不屬而不知此篇意最融貫也余又謂枝上栁綿吹漸少天涯何處無芳草此意亦深切余在會稽嘗作送春詩曰墮紅一片已堪疑吹到楊花事可知借問春歸誰與伴淚痕都付石榴枝蓋兼用兩詞之意書生此念千載一轍也吕子進長短句元祐中書舍吕希純字子進作長短句上章言人之避禍曰莫交閒慮到心頭有來憂不得無後不須憂下章言人之求福曰萬般希望不如休無來求不得有後不須求可謂善處禍福之間者矣因諱改字歌者多因諱避輒改古詞本文後來者不知其由因以疵議前作者多矣如蘇詞亂石崩空因諱崩字改為穿空秦詞杜鵑聲裏斜陽樹因諱樹字改為斜陽暮遂不成文滿庭霜以霜為慘遂改為芳照不眠以不為入聲遂改為無或改為孤而不知樂府中以入與平為一聲也近年因為慈福太皇家諱近字凡近拍者皆改為傍拍他時必不能曉傍拍之義也文苑英華周丞相云禁中有舊本文苑英華一千卷淳熙中為近習校讎改易國諱盡壞舊本其甚害理者如押殷字韻詩改殷為商遂併一詩之韻字字改之令盡協商字蓋禁中既委近習而近習又自募後生舉子輩為門客競以能改避為工殊可痛惋丞相因此遂自校一本藏之于家恨未能刋行不然他時禁中本一出流布人間遂皆以近御府所藏為正則不可復救矣項氏家說卷八
