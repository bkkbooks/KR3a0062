body:
  text: 項氏家說卷四宋項安世撰說經篇四泳思方思漢言泳江言方者漢水淺狹可泳而踰江水深濶必方舟而後能濟各因其實以起興也詩中思字思語辭也用之句末如不可求思不可泳思不可度思天惟顯思用之句首如思齊大任思媚周姜思文后稷思樂泮水皆語辭也說者必欲以為思慮之思則過矣且親從魯侯戾止在泮而詠之矣何為思耶於繹思敷時繹思皆當以為語辭繹者不絶之義繹思猶繹如也素絲五緎說文􅀈羔裘之縫也詩曰羔羊之黬以黑為縫也許氏自言其所引皆毛氏詩則今作緎字者非毛義也何彼襛矣說文衣部襛字注云衣厚貌引詩曰何彼襛矣則襛字當從衣也案石經及陸德明釋文並從衣此蓋因宋時刋版從禾故辨之有洸有潰注以洸為武但取武夫洸洸之意而于字義未有考也按說文洸字水涌洸也引詩此句為證徐鍇注曰言其勇如水之涌也得此然後武之義始明毛氏曰潰怒也是用不潰于成草不潰茂毛氏曰潰遂也潰潰回遹無不潰止毛氏曰潰亂也三說雖不同其實皆暴盛之貌水之潰者其勢橫暴而四出故怒之盛者為潰怒遂之盛者為潰遂亂之盛者為潰亂皆一理也兩髦先儒但云象幼時鬌皆莫能名其物據說文髦作鬃注云髮至眉也則是以髦作僞髻垂兩眉之上如今小兒用一帶連雙髻橫繫額上是也漢所謂鬌當即如此唐六典通天冠云若未加元服則雙童髻空頂黑介幘即此制也是紲袢也說文衣部䙝字云私服也詩曰是䙝袢也袢字徐鍇注曰袢煩溽也近身之衣按此則二字皆主裏衣言之又展字注云冬則衣展衣夏則裏以皺絺其意正解此詩亦明當以䙝溽為義也言采其虻說文莔貝母治目眩項直不得反顧故許穆夫人思歸不得作詩曰言采其莔戌申按幽王廢申后太子宜咎奔申申侯與犬戎攻周弒幽王晉文鄭武迎宜咎于申而立之自天理觀之則申侯為平王不共戴天之仇自平王觀之則申侯乃其賈充成濟也其戌之宜矣無我魗兮毛注魗棄也疏求其說而不得遂曰魗與醜同醜惡可棄之物故傳以為棄安世按說文􅪅棄也引詩無我􅪅兮則不假醜義矣詩中故好二字故謂故舊也好謂契好也詩人喜用此二字鄭風遵大路兮不寁故也不寁好也唐風羔裘維子之故維子之好溱與洧山海經北山篇曰繡山其草多勺藥洧水出焉歌以訊之龍龕手鑑作歌以誶止正與上文有梟萃止相叶古文之止字字形相近薈兮蔚兮說文嬒女黑色也詩薈兮蔚兮按此義與下文季女相當豳七月七月首章總言衣食之事二章三章四章皆言衣食二言帛三言布四言褐五章言寒備亦結首章觱發栗烈之意六章七章八章皆言食事六言蔬茹七言穀粟八言祭饗也又前四章皆以下愛其上終之田畯至喜殆及公子同歸為公子裳為公子裘是也後四章皆以上勞其下終之嗟我婦子食我農夫嗟我農夫躋彼公堂是也此可見當時上下之情矣又每章必兼二事首章衣兼食二章蠶兼婚三章桑兼麻四章取裘兼講武五章前嵗兼後嵗六章老兼壯七章田兼廬八章藏冰兼勞農也八月剝棗夏小正曰八月剝瓜畜瓜之時也剝棗剝者取也栗零零者降也零而後取之故不言剝也出車采芑出車之遣南仲為玁狁也而其詩曰赫赫南仲薄伐西戎采芑之遣方叔為蠻荆也而其詩曰顯允方叔征伐玁狁命將者必道其前功所以壯軍威而必後效也匪載匪來憂心孔疚此續上章之意也聞檀車之幝幝見四牡之痯痯謂征夫之不逺矣及即而視之則車匪吾征夫之載也馬匪吾征夫之來也思之切而聽之誤也此最人之所甚悲而不能堪者以是勞之足以盡居者之情矣何人斯五章六章何人斯曰爾之安行亦不遑舍爾之亟行遑脂爾車一者之來云何其盱此言讒人之情狀也爾之平時輕躁有素雖在徐行常不暇息况以急行必不暇脂爾轂也一昨之來何乃遲遲如是然則徘徊窺伺將造讒以害我者必此時也下文又終言之汝行之遲固已可怪而及其還也又不過我則一昨之來宜我心之病汝也盱者張目四顧故作遲遲之狀也易曰盱豫悔遲有悔豫有怠意其用盱字亦與此同鴛鴦首章次章鴛鴦于飛畢之羅之毛氏注曰交于萬物有道取之時于其飛乃畢之羅之鴛鴦在梁戢其左翼鄭氏箋曰鴛鴦休息于梁明王之時人不驚駭無恐懼也堇荼如飴說文堇根如薺葉如細栁蒸食之甘徐鍇注引爾雅齧堇郭注云今堇葵也葉似栁子如米汋食之滑詩所謂堇荼如飴則此菜之味昆夷駾矣說文呬字注詩云犬夷呬矣東夷謂息為呬按許氏自敘云詩引毛氏則非齊魯韓三家之說也今乃作昆夷駾矣蓋昆或作混混之與犬駾之與呬皆聲近而傳之訛也下武古語皆以下為後吕刑曰遏絶苖民無世在下言其後無子孫也自作元命配享在下今天相民作配在下言其子孫世享于後也然則下武謂其後踵武相接云爾故曰下武維周世有哲王三后在天王配于京正與配享在下辭意相類意者其周人之方言歟小子抑之詩衛武公使人日誦以教己者也武公既耄矣而使人呼之為小子者古語之常也今西北人凡與人言皆呼曰小子周書君臣之間亦通以小子為辭如已汝惟小子之類嘗見祕書郎楊方云周書多用已字發辭此亦關中之俗每欲發言輒先曰住古之已今之住也衛武公年九十有五使人日誦抑詩其詩自言亦聿既耄知為耄年所作既耄而猶再三曰小子其謙抑至矣淇澳賓筵抑皆武公之詩淇澳作于盛年言學問賓筵抑皆戒飲而抑乃既耄之作其慎言慎獨論語中庸取焉般般之詩因祀山川而興周家福祿之盛也如髙山之起如嶞山之延如喬嶽之深厚而廣大也民信其道如翕河之㑹合而衆盛也敷天之下裒時之對即以對于天下也言人心之合也時周之命即以篤周祜也言天命之固也人心之合又可以見翕河之象天命之固又可以見山嶽之象時邁與般皆祀山川之詩時邁賦周家之功德則用之於神者也般興周家之福祿則尸以答君者也多辟蕩詩曰疾威上帝其命多辟殷武曰天命多辟設都于禹之績說詩者以蕩為王政之辟以殷武為衆國之君似非本義辟音僻背違也天命多辟猶天命靡諶皆古之常語也蕩詩言天有禍疾威怒之可畏其命多背而難信故下文又云天生蒸民其命匪諶也殷武上章既言曰商是常以美其祖宗之功德次章復言天命之多背今商之子孫雖都于禹之土地亦不敢以常保故以嵗事來享於先君而冀神祐之以免於禍適則長得奉其稼穡以為粢盛而不敢解也嵗事即祝詞之祗薦嵗事也稼穡匪解即魯頌之春秋匪解也下文天命有嚴不敢怠遑意亦同此板詩言民之多辟亦言民之向背無常人君不可自以私意作法當以天道牖之則如塤箎之應如圭璋之信如攜取之易而不假於附益也左氏泄冶之說斷章取義與此不同詩中借辭引起作詩者多用舊題而自述己意如樂府家飲馬長城窟日出東南隅之類非真有取于馬與日也特取其章句音節而為詩耳楊栁枝曲每句皆足以栁枝竹枝詞每句皆和以竹枝初不於栁與竹取興也王國風以揚之水不流束薪賦戍申之勞鄭國風以揚之水不流束薪賦兄弟之鮮作者本用此二句以為逐章之引而說詩者乃欲即二句之文以釋戍役之情見兄弟之義不亦陋乎大抵說文者皆經生作詩者乃詞人彼初未嘗作詩故多不能得作者之意也詩有抑彼揚此之體詩有抑彼以揚此者文藝當然非真以彼為不足道也常棣曰每有良朋况也永歎每有良朋蒸也無戎非真以朋友不足親也以為不若兄弟之尤親耳氓曰士之耽兮猶可說也女之耽兮不可說也非真以士為可以耽溺也以為不若女之尤不可耳十月之交曰彼月而食則維其常此日而食于何不臧非真以月食為不足憂也以為不若日食之尤可憂耳故曰以意逆志是為得之魯詩按列女傳芣苡蔡人之妻作也宋女嫁蔡夫有惡疾而不去也行露申人之女作也女稼於酆夫禮不備持義不往也邶柏舟衛宣公夫人作也齊女嫁衛及城而衛君死衛君之弟請同庖而不聽也式微黎莊公之夫人作也夫人既嫁而公不納傅母勸之去而夫人拒之也碩人莊姜傅母作也莊姜操行衰惰而母救之也大車息夫人作也楚納息夫人以息君守門二人相約俱死也劉向父祖世受魯詩故其作列女傳所載如此去古既逺獨毛詩存韓詩猶有外傳及薛君章句齊魯二家不獲可識因此亦略見魯學之一二故備録之以顯今毛氏序非必皆古之國史本文矣詩音吳氏詩補音學者多疑之但據陸氏釋文謂古人韻廣遂不究吳氏之說然釋文中稱協韻處亦不為少則雖陸氏固不敢自信其韻廣之說也且雜用衆韻謂之韻廣可也今止用一韻但與今韻不同安得便以為廣凡詩中東字皆協蒸字韻南字皆協侵字韻下字馬字皆協補字韻母字有字皆協止字韻英字明字皆協唐字韻華字皆協模字韻為字皆協戈字韻服字皆協德字韻天字皆協真字韻其所通韻皆有定音非泛然雜用而無别者于此可見古人呼字其聲之髙下與今不同又有一字而兩呼者古人本皆兼用之後世小學字既皆定為一聲則古之聲韻遂失其傳而天下之言字者於是不復知有本聲矣雖然求之方俗之故言參之制字之初聲尚可考也如烏謂之鴉姑謂之家潭之字為沈庵之字為陰明都之明為望不羮之羮為郎甄官之後音真陳常之後為田蔔之為葡馮之為憑凡此皆方俗之故言也而考之於詩而合焉痏洧從有而音偉宄軌從九而音鬼婪婪皆從林聲而讀如藍鱏鐔皆從覃聲而讀如尋英之聲從央盲之聲從亡顛填之聲從真福輻之聲從畐為孤苽者瓜聲為波頗者皮聲凡此皆制字之初聲也而考之於詩而又合焉夫字之本聲不出於方俗之言則出於制字者之說舍是二者無所得聲矣今參之二者以讀聖經既無不合矣而世之儒生獨以今禮部韻略不許通用而遂以為詩人用韻皆泛濫無準而不信其為自然之本聲也不亦陋乎詩句押韻疏密詩有一句一韻者薄汙我私薄浣我衣害浣害否歸寧父母是也兩句一韻者常體皆然有三句一韻者亦既見止亦既覯止我心則降是也有四句一韻者卬盛于豆于豆于登其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今以歆與今為韻是也此章又于韻中用韻本是歆與今為韻而上四句中登于升下四句中祀于悔音毁又自為韻也有隔韻用韻者我心匪石不可轉也我心匪席不可卷也本是轉與卷為韻案此下有脫文當云而石于席又自為韻也用韻者案此三字上亦有脫文當云有隔章用韻者新臺有泚河水瀰瀰與次章有灑浼浼同韻燕婉之求籧篨不鮮與次章不殄同韻也詩押韻變例詩有上聯不押韻而下聯連用兩韻者如我徂東山慆慆不歸我來自東零雨其濛穀旦于差南方之原不績其麻市也婆娑是也詩有第一句不押韻而以首句押韻與次聯相應者如決拾既佽弓矢既調射夫既同助我舉柴柴與佽相應也有瞽有瞽在周之庭設業設虡崇牙樹羽羽與瞽相應也詩有每章引聯皆不用韻如瞻彼洛矣維水泱泱三章皆用此兩句而不用韻賓之初筵左右秩秩賓之初筵溫溫其恭賓既醉止載號載呶凡此飲酒或醉或否四章章首兩句皆不用韻是也以上三例皆屬四句一韻之例但間有一聯如此而下不皆然故不可不論也重押韻詩有以一韻成一章者如執競之末章云降福簡簡威儀反反既醉既飽福祿來反重押反字那之三章云既和且平依我磬聲於赫湯孫穆穆厥聲重押聲字皆一章止用一韻也詩音類例詩韻皆用古音不可勝舉今擇衆音之聚者舉之以為例采苓采苓首陽之巔人之為言茍亦無信此青字先字真字三韻之聚為一者也中谷有蓷暵其修矣有女仳離條其嘯矣條其嘯矣遇人之不淑矣此尤字蕭字東字三韻聚而為一者也匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止㑹言近止征夫邇止此灰字尤字之字真字皆字欣字六韻之聚而為一者也我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣此東字灰字蒸字三韻聚而為一者也以為酒食以享以祀以妥以侑以介景福此蒸字之字尤字東字四韻聚而為一者也既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉此之字歌字麻字三韻聚而為一者也鼓瑟鼓琴笙磬同音以雅以南以籥不僭此侵字覃字鹽字三韻聚而為一者也載馳載驅歸唁衛侯驅馬悠悠言至于漕此虞字尤字豪字三韻聚而為一者也人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世此先字寒字齊字三韻聚而為一者也三爵不識矧敢多又則蒸與尤聚也爰居爰處爰喪其馬則虞與麻聚也憂心忡忡我心則降則東與江聚也淒其以風實獲我心則東與侵聚也不可泳思不可方思則清與陽聚也通乎此十四例則凡三百六篇之音皆可以類推矣詩諸家異字詩中有與諸家字異而義同者固不必録而其間亦有可以發明此義者子之還兮韓詩還字作嫙好貌也其為相歆羡之語尤信噬肯適我韓詩噬作逝其為發語之辭尤明棘人欒欒兮說文作臠臠尤足以見其癯瘠之狀衣裳楚楚說文作尤足以見其采㑹之容觱發作滭冹初寒之意愈明許許作所所木柿之聲愈辨疐作躓即可以見其為顛麗作􅀈即可以見其為數匪鶉為鷻即可以見其為鵰衣裼作締即可以見其為褓趚側行也比蹐字為明郃地名也比洽字為明圪牆髙貌比仡仡字為明獷猛戾貌比憬彼字為明緀白文貌比萋兮字為明大也比秩秩為明念㕧呻吟也比殿屎為明滄況寒貌也比倉兄為明反豫來赫不若陸氏釋文之嚇字緝緝翩翩不若許氏說文之咠字凡此皆于毛氏之義有所發明故具記之項氏家說卷四
