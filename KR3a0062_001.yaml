body:
  text: 項氏家說卷一宋項安世撰說經篇一三正說朝議大夫姚大老名小彭作周易外傳辨三代及秦漢置正皆不改夏時其說博而有理今錄之其大義曰漢儒好信竒怪而不揆事理左氏公羊髙猶以周正解春秋孔安國以周正觧書鄭康成以周正解毛詩周官劉歆以三正作三統厯此皆名儒雅望猶為妄謬况其凡乎相與追步星辰遷就其說所謂黄帝調厯顓帝夏商周魯六厯皆偽書也史官推攷皆不堪用朏朔虧食不與天合蓋皆其學術之偽妄而況諸儒之所記錄詎得其真乎今自易臨卦之八月書太甲之十二月泰誓武成之一月召誥洛誥之烝嵗豳詩之七月小雅之十月之交周官之正月春秋之首月皆以夏時夏月訂之無不合者又以汲冢紀年之嵗首皆用建寅三統厯之冬至皆在十一月秦吕不韋之月令一用夏時史漢之稱月一用夏時合而證之無可疑者秦漢實繼三代其置正皆不改月明白如此漢諸儒身當本朝而不知尊信相與倡為偽妄豈不戾乎其條目證驗如下易臨卦八月有凶于消息卦觀四陰為八月于辰在酉臨與觀反對之卦今之息後之消也故八月有凶即夏之八月也何氏主周正從建子至建未為八月以遯為凶孔氏主商正從建丑至建申為八月以否為凶皆非書太甲元祀十有二月乙丑伊尹祠于先王此踰年改元嵗首出見祖廟也明商雖建丑仍稱十二月也孔安國不得其說遂以十二月祠祖之文推排湯崩在十一月以為商家猶質踰月改元舜禹禪位猶須正月上日月正元日乃受終于祖宗況繼崩乎元祀既十二月為嵗首則三祀之十二月朔以冕服歸亳亦嵗首耳書泰誓一月戊午師渡孟津序曰春大㑹于孟津孔安國注云此周之孟春今按泰誓武成之稱一月皆建寅之正月故曰春如是商之十二月周之正月即建子之月孔子何為稱春乎不云正而云一或云改正在甲子後史追書之為一月理或然也然汲冢書柔武小武二篇乃武王元祀二祀未改正之時亦云一月則知一月即正月非必追書也或者商人置嵗不在寅故寅月避正之名止稱一月乎左氏國語武王伐紂月在天駟日在析木之津辰在斗柄星在天黿韋昭注及唐大衍厯議皆據之以推武王以夏正十月商十一月二十八日戊子起師日在箕十度則析木之津也月在房四度則天駟也又三日得夏正十一月商十二月周正月庚寅朔韋昭以為辛卯日月㑹南斗一度故曰辰在斗柄一月壬辰夕辰星在南斗二十一度明日癸巳辰星與周師俱進由建星厯牛女戊午渡孟津而辰星伏于天黿今按麟徳厯周師始起嵗在降婁月宿天根日躔心而合辰在尾水星伏于星紀不及天黿也又左氏于春秋内傳皆用周正則于外傳安肯從夏時哉其排比日辰自應有所諧合韋昭解注只得從之大衍循之而稽其偽謬云爾然吾所知者孔子之本序也若得三代真厯求之未必非春之星次也史記言十二次正月寅南至于箕二月卯南至于心于房三月辰南至於氐于房古厯南斗命度尾箕斗為析木是亦得天駟析木也何必子丑哉安世按武王一月二十八日戊午渡孟津二十九日己未誓師二月三日癸亥陳於商郊四月甲子陳于牧野四月三日辛卯還于豐十九丁未祀廟二十一日庚戌柴望或周或夏自無所疑諸儒何須必以周正亂之書召誥二月二十三日乙未王至豐三月五日戊申召公至洛十二日乙卯周公至洛洛誥戊辰王在新邑烝祭嵗命周公後在十有二月惟周公誕保文武受命惟七年孔安國云王以十二月戊辰晦到孔穎達云周之十二月建亥明日夏之仲冬始于新邑烝祭穎達云周之嵗首故言祭耳今按戊辰乃十一月非建亥之晦也烝祭在冬周嵗在子故用嵗首烝祭其下十二月即建丑之月也故曰七年不云七嵗明以丑為十二月四時終而後成年也詩豳七月皆用夏正其于周正但稱一之日爾二三四皆以次序為文未嘗改月也小雅十月之交即十一月朔嵗首日食是以醜之必以為夏之八月何至若是醜哉周官正月之吉鄭氏以為周正又有正嵗鄭氏以為夏正今按地官正月之吉始和頒教法于鄉吏鄉大夫州長皆正月讀之而黨正獨云四時之孟月吉日則正月非建子矣無乃夏正仍謂正月周正乃為正嵗如書之烝祭嵗乎大都中氣謂之嵗而日月十二㑹謂之年周正子而又仲月宜有嵗稱乎周官祭祀田獵朝㑹所書一皆合于夏時是知四時仍用夏正也春秋王正月左氏公羊學以為周正今按春秋以月繫時四時十二次不可易也若是周正則春乃是冬十二次皆當改稱則聖人親筆之書曽春冬之不知乎王乃時王而月用夏時明夏時三王所同用未嘗改稱也但所用之正不同耳襄三十年晉絳人云臣生之嵗正月甲子朔杜預云正月謂夏正月然則傳所謂周正又足據乎安世按春秋所書四時十二月恐皆夫子筆之以為萬世法知必如此而後為正只此便是褒貶之筆也乃若周家本稱決無改月之理蓋前攷夏商之書後觀秦漢之史其例甚明而汲冢周書亦自稱為十有一月既南至則無可疑矣史記秦本紀漢本紀年首皆書冬十月至于春正月乃在其年中仍不改其名其他月亦不移其次至武帝太初年夏五月以正月為嵗首明年始書春正月終冬十二月竹書紀年篇晉太康初汲人所獲魏冢古書也其載夏商周三代之事皆用夏正建寅之月為嵗首漢書載劉歆三統厯述商厯云成湯用事十三年十一月甲子朔旦冬至則十一月非建亥也禮記載秦吕不韋所作月令四時孟仲季皆夏正也安世按此諸說皆是獨攻左氏公羊春秋為非蓋春秋自是孔子之書即非周王所用與今諸說自不相害也乃若左氏國語遂以為周王果已用此則春秋本意左氏殆未知之是則不可不辨也上六振恒凶說文云孟氏易振作榰云柱砥也此陸氏釋文所不載也大衍之數五十大衍之數五十其用四十有九揲卦之法曰第一揲不五則九第二第三不四則八其實三揲皆四與八但第一揲用四十九多此一竒故四為五而八為九爾自第二揲以往無復竒數自然為四與八也凡揲左手得一得二得三皆為四也惟得四則為八觀左之所得而右手可知矣然不合兩手之餘不足以成七八九六之數也餘四七者為少陽餘四八者為少陰餘四九者為老陽餘四六者為老陰是故左手之一二三四生數也合右手而見七八九六成數也生成數皆用其四不用五者四立則五在其中也四不立則五不見故亦止于四營而成六即一合五也八即三合五也九即四合五也亦止一二三四而已小數止于四大數止于九五與十皆伏而不見是故大衍之數五十其用四十有九然而十與五常藏于七八九六之中九六合而為十五七八合而亦為十五七八九六當一月之日數也九六七八竒為參耦為兩乾三竒三三為九故老陽之數九坤三耦三兩為六故老陰之數六震坎艮一竒二耦三與四為七故少陽之數七㢲離兊二竒一耦六與二為八故少陰之數八九與六為十五當一氣之日七與八為十五亦當一氣之日老陽之䇿三十六老陰之䇿二十四合為六十當以甲子之日少陽之䇿二十八少陰之䇿三十二亦合為六十當以甲子之日乾坤六爻之䇿共當三百六十少陰少陽六爻之䇿亦共當三百六十乾坤二篇之䇿萬有一千五百二十少陰少陽二篇之䇿亦萬有一千五百二十象閏今之言揲蓍者謂初一揲掛第二第三揲不掛于象閏之說皆不可通若以扐象閏則毎揲必有扐三扐凡三閏不得為再閏也若以掛象閏則每揲三扐而後一掛止為三嵗一閏不得為五嵗再閏也朱先生曰初扐為左手之扐再扐為右手之扐故止有再扐無三扐也後掛謂次揲亦掛也聖人止言一揲之法明一掛十八揲皆然無掛與不掛之分也揲蓍揲蓍者左得一則右得三左二則右二左三則右一左四則右四其初得之蓍皆一二三四也算其餘䇿則為六七八九而五具焉此自然之四十五數也而言河圖之九宫者用之䇿數爻成于䇿故求䇿者皆以成數除之六七八九十是也四六四七四八四九其中皆有十焉成物者屬地故䇿之成也皆得地數二四六八十是也三十二二十四三十六二十八其中亦皆有十焉乘數者必以四則四營成易之道也主數者必以三與二則參天兩地之數也十必寓焉則土王四季之象也此皆自然之理不可誣也以字法推五數古之制字者一二三四皆依數布畫至五則為乂象四氣交于中不以數畫也數至此備矣自此以往皆演之而已六八陰也則如又而分之六從入從八向于分也八全分矣七九陽也則如又而伸之七始橫伸九則直伸之矣十者數之終五之成也故如乂而四伸之以定四方中央之位焉所以明七八九六皆合五而成也以算法推五數布算者下一籌為一下二籌為二下三籌為三下四籌為四皆有籌焉獨五籌則不下至五則起而為一以寓于數之上自此以往皆就五加之加一為六加二為七加三為八加四為九獨十則不加至十則變而為一而數泯矣故一二三四以數立七八九六以五成而十與五皆無數焉小數極于四大數極于九然而每數必用五籌而後成算此皆自然之理是故一二三四正而天地之數備矣參天兩地參以三數之兩以二數之天之數常該三地之數常守二此聖人發明數學之要也乾之九為三者三坤之六為三者二合為三五以當一月盈闕之數乾爻三十六䇿為三嵗之餘日坤爻二十四䇿為二嵗之餘日合為五嵗之餘以當再閏之數乾卦之䇿二百一十有六為七十二者三坤卦之䇿百四十四為七十二者二合而為七十二者五以當一嵗之日五日一候之數也天下之數一必有兩舉一則兩從之一與兩為三故天之數常該三自二以往為兩而已故地之數止于兩乾則包坤坤則不能包乾也初中末陰陽在初者為長在中者為中在末者為少初為氣末為形中為精雷風氣也山澤形也水火精也陽中生水陽之陽為雷陽之陰為石陰中生火陰之陽為風陰之陰為鹵水陰精也而為陽中火陽精也而為陰中陽主動作而成堅實陰主悠揚而成浸潤陽陷乎陰動而有成陰麗乎陽入而致說男之初也陽精在下中交于陰末則陽上盛而男道絶矣女之初也陰血在下中交于陽末則陰上行而女道絶矣精稟于父為腎坎水所以為男血受于母為心離火所以為女丹砂石火槐檀柞楢取火之物皆生于地雨雪露霜雲霧霰雹成水之物皆降于天健順動入止說健則能動矣順則能入矣健順其體也動入其用也健復為順之體動復為入之用動而得志則止入而得志則說一陽在上二陰在下安得而不止一陽在下二陰在上安得而不動上下經卦象臨觀剝復震艮之象也大過頤小過中孚坎離之象也遯大壯姤夬巽兊之象也既濟未濟否泰之象也復者喜其還也夬者決之也臨泰大壯皆美辭也姤者不期其至也剝者傷之也遯否觀皆懼辭也上經男女之交隨蠱噬嗑賁四卦而已下經男女之交咸恒損益漸歸妹豐旅渙節既濟未濟凡十二卦上經皆乾坤坎離之卦乾十坤十坎六離四其否者隨蠱頤大過四卦下經皆風雷山澤之卦震七艮七兌十巽十其否者晉明夷既濟未濟四卦八卦本字按說文益字從水從皿以水注皿故謂之益以此推之坎卦即水字也初作八卦之時乾坤坎離震兌艮巽必皆以三畫為字今巛尚為坤尚為水餘可知矣乾坤卦氣乾坤二卦每卦主半年每爻主一月乾之初九起于子九二主丑九三主寅九四主卯九五主辰上九主已是乾之六爻分主六陽月也坤之初六起于午六二主未六三主申六四主酉六五主戌上六主亥是坤之六爻分主六陰月也又按律吕相生法乾爻主竒月初九自子左行至戌為上九坤爻主耦月初六自未右行至酉為上六亦以兩卦十二爻分主十二月也四正卦氣四正卦不當六日七分之直每卦主一季每爻主一氣二十四爻分主二十四氣也震之六爻主春分清明穀雨立夏小滿芒種六氣離之六爻主夏至小暑大暑立秋處暑白露六氣兊之六爻主秋分寒露霜降立冬小雪大雪六氣坎之六爻主冬至小寒大寒立春雨水驚蟄六氣太𤣥以勤當坎以應當離以疑當震以沈當兊亦不在直日之數十二卦氣消息十二卦每卦主一月每爻主一候毎一卦當乾坤二卦之一爻毎三卦當四正卦之一卦復卦主鶡鴠不鳴至水泉動六候臨卦主鴈北鄉至水澤腹堅六候泰卦主東風解凍至草木萌動六候大壯主桃始華至始電六候夬主桐始華至戴勝降于桑六候乾主螻蟈鳴至小暑至六候姤主螗螂生至半夏生六候否主凉風至至禾乃登六候觀主鴻鴈來至水始涸六候剥主鴻鴈來賓至蟄蟲咸俯六候坤主水始冰至閉塞成冬六候六十卦氣除四正外六十卦每卦主六日七分五卦共主一月毎五卦當前十二卦之一卦故每月各以前十二卦為辟卦也未濟蹇頤中孚復五卦主大雪冬至二氣屯謙睽升臨五卦主小寒大寒二氣小過䝉益漸泰五卦主立春雨水二氣震隨晉解大壯五卦主驚蟄春分二氣豫訟蠱革夬五卦主清明穀雨二氣旅師比小畜乾五卦主立夏小滿二氣大有家人井咸姤五卦主芒種夏至二氣鼎豐渙履遯五卦主小暑大暑二氣恒節同人損否五卦主立秋處暑二氣巽萃大畜賁觀五卦主白露秋分二氣歸妹无妄明夷困剥五卦主寒露霜降二氣艮既濟噬嗑大過坤五卦主立冬小雪二氣五卦之序一為侯二為大夫三為卿四為公五為辟候分内外以朔氣前三日為内朔氣後三日為外五卦之序其義未聞焦氏卦法乾坤至既未濟並依易書本序以一卦直一日乾直甲子坤直乙丑至既濟直壬戌未濟直癸亥乃盡六十日而四正卦别直二分二至之日坎直冬至離直夏至震直春分兌直秋分不在六十卦輪直之數此即上文六十卦氣之法但彼主六日七分此但主一日彼用太𤣥之序此用周易之序爾京氏卦法一世卦陰主五月一陰在午也陽主十一月一陽在子也二世卦陰主六月二陰在未也陽主十二月二陽在丑也三世卦陰主七月三陰在申也陽主正月三陽在寅也四世卦陰主八月四陰在酉也陽主二月四陽在卯也五世卦陰主九月五陰在戌也陽主三月五陽在辰也八純卦皆以第六爻為世陰主十月六陰在亥也陽主四月六陽在已也遊魂卦以第四爻為世其所主與四世同歸魂卦以第三爻為世其所主與三世同一世二世為地易三世四世為人易五世及八純為天易遊魂歸魂為鬼易右京氏卦氣主月義與十二卦同而所用之卦則異以其所主在爻而不在卦也卦氣序卦之異安世嘗攷卦氣之序與易之序卦不同儒者多以為疑今按卦氣太𤣥之法也以太𤣥諸首之辭次第推見始終其氣候蓋甚相貫猶今周易以序卦推之委曲相承或順或反亦可得而通也晁公武氏曰二者皆有爻數可攷上篇反覆十八卦陽爻五十二陰爻五十六下篇亦十八卦陽爻五十六陰爻五十二此周易序卦以二百一十六均在兩篇也亥子之月自艮至復十卦陽爻二十四陰爻三十六己午之月自旅至姤十卦反之丑寅之月自屯至泰十卦陽爻二十四陰爻三十六未申之月自鼎至否十卦反之卯辰之月自需至夬十卦陽爻三十二陰爻二十八酉戌之月自巽至剥十卦反之此太𤣥卦氣之序以六十數均在兩月也故自冬至迄夏至自復迄咸凡三十卦陽爻八十八陰爻九十二自夏至迄冬至自姤迄中孚凡三十卦陰爻八十八陽爻九十二共三百六十日其陰陽多寡之數皆適相等今按以義通之既具前文以數通之又如晁說則儒者之于卦氣又何以多疑為哉項氏家說卷一
