body:
  text: 項氏家說附録卷一宋項安世撰孝經說古文以至德章後次以感應章次揚名章次閨門章次諫爭章次事君章次喪親章按感應接至德章後閨門接揚名章後事君接諫爭章後文義皆貫則古文近是今從之章次之義五孝備矣然後三才孝治聖治分别在上者之孝事親五行分别在下者之孝要道至德感應復推演在上者之孝揚名閨門諫爭事君復推演在下者之孝而以喪親終焉開宗明義章仁義禮智禮樂之實皆起于事親從兄故為德之本因親以教愛因嚴以教敬是以其教不肅而成故為教之所由生在己為德率人為教自事親言之始于愛其體終于行道顯名自粗而至精也自行道言之始于家中于國終于名立于後世自近而至遠也始于事親但言溫凊定省之屬中于事君猶是指忠言之終于立身身則無所不備矣五常百行無非孝也此孝之大成也夫孝始于事親中于事君終于立身學者多疑之此蓋以嵗月論也事君之日起于膝下故稱始焉事君者自強而仕至老而𫝊故稱中焉至于身則死而後亡為斷也天子章天子之孝當保四海愛親者敬親者即下文愛敬盡于事親也不敢惡于人不敢慢于人即下文德教加于百姓刑于四海也刑與形通著之義也孟子齊宣王易牛之意與此同言舉斯心加諸彼而已諸侯章諸侯之孝在能保其國國者祖先之世守也驕溢則亡之矣諸侯生而有國専地與民易于犯上觀漢諸侯王𫝊可見故専以驕溢戒之富貴不離其身然後能保其社稷而和其民人能保身然後神有所依民有所仰不然身不可保保土與民安得而有之此甚言驕溢之禍可畏也故以戰戰兢兢明之保者保而有之和者合而附之卿大夫章士章庶人章非法不言非道不行中庸曰動而世為天下道言而世為天下法循道而行在人則為德故曰非先王之德行不敢行又曰非道不行大臣民之表也衣服不二出言有章行歸于周三者皆民所望也小臣事人者也故專論事父事母事君事長之道庶人則飬而已天子之不敢慢不敢惡諸侯之戰戰兢兢卿大夫之夙夜匪懈士之夙興夜寐庶人之謹身節用雖行事不同其操心一也孝治章論治天下治國治家亦皆以不敢為言三才章夫孝天之經也地之義也民之行也孝者順德之民日月星辰順乎天百穀草木順乎地人順乎父母經者常度義者物宜猶曰天文地理云爾天之明地之利言循經與義之效也天文不順則失其明地理不順則失其利也天地之經而民是則之則之為言順其常而行之也非謂法天地之經以為斯民之孝也孝自是民之常性非有所象而為之也嚴肅之義固同就二者分之肅為輕于嚴也肅主于情嚴主于事肅有竦飭之義故于教言之嚴有恐迫之義故于政言之辭嚴而氣厲教之肅也令急而法重政之嚴也先之以博愛保惠之也陳之以德義訓誥之也先之以敬讓身率之也此先字與上文先字不同上文是先務之先此是率先之先導之以禮樂則立為教條矣示之以好惡則刑政行焉此先王治天下之序也先之以博愛而民莫遺其親生養之道足則情義厚也聖治章天生萬物以人為貴人有百行以孝為先事父事母皆孝也而比之母則父為尊故莫大于嚴父自天子至于庶人皆嚴父也而其生也以天下養其死也尊以配天則惟天子然後得極其大焉故莫大于配天也聖賢之言有為經生所汨亂者如孝經周公嚴父之說所繫最大不可不辨也夫所謂嚴父者不獨謂生己者也自父以上曰王父曰曽祖王父曰髙祖王父皆父也祖者始也王者大也言始初最大之父也雖上而百世之祖亦猶曰百世之大父云爾凡父之所從生與父之所同生皆父道也若止取生己者為嚴父之祭則成王止應以武王配天不應以后稷配天文王配帝也後儒不明其說遂至配天之際每世一變以為凡為人子者皆當自嚴其生己之父使侑天者無常主作主者無常位黷天慢祖莫大乎是是則經生讀經不考下文之罪也又所謂周公者特言是禮定于周公之手以為姬之受姓自后稷始猶天之始萬物也故推以配天周之王天下自文王始猶上帝之宰百神也故推以配上帝是二主者皆周家之大父也配主一定三十七王八百餘年遵而用之無敢易也豈有三十七主皆得配天之理周公蓋以當國大臣為其國家定郊廟之禮者爾烏有已為大臣而得自嚴其生己之父以配上帝者哉此說之至不通者而由孝經以來千五百年莫有明其說者遂至以聖人之言為黷天慢祖之據經生以辭害意之罪一至于此可勝歎哉則周公其人也周公蓋成武王之意而已然武王末受命而周公行之故孔子言孝必以周公與武王竝天子之所以嚴其父者于是為不可加矣親萌于膝下之時嚴滋于日長之際二者聖人因之愛敬之教所由興也故親生之膝下愛之本也以養父母日嚴敬之本也父子之道天性也此愛之所以不可割也君臣之義也此敬之所以不可簡也父母生之續莫大焉人子之髮膚即父母之傳體天下之相續者未有親于此者也夫如是安得不愛君親臨之厚莫重焉國積尊而極于君家積尊而極于親天下之相臨者未有重于此者也夫如是安得不敬以上三節皆反覆推明愛敬之理以見教之本于順人而人之不可以逆此也以順則逆民無則焉不在于善而皆在于凶德雖得之君子不貴也此為愛敬他人者言也將以為順而實則凶自以為得而其失甚大冉三言之甚明其不可也先親而後人言之順也自親而及人行之順也言順則可宣于口故可道行順則合于人心故可樂自是推之無所往而不順焉積之為德義散之為行事望其容止之狀察其進退之儀皆順道也皆吉德也一動容一舉足無有逆于道者非天下之至孝其孰能與于此可尊言其意象可法言其事跡可觀可度之别亦然德義作事容止進退四者即言行之目也故獨于言行用兩思字惟其所發不茍故其所著見者無不善也古文思皆作斯亦不可茍之意也畏而愛之其心也則而象之其跡也德教道之也政令齊之也博愛敬讓德義皆德教也禮樂好惡皆政令也畏而愛之畏之在初愛之在久君子之為皆然畏生於嚴愛生于親皆出于孝也則而象之則猶擬度也象猶倣效也擬度其人而倣效其事故能成其德教而行其政令身不行道則雖教之而不成令之而不行也宋景文公曰郊曰天配以祖遠而敬之也明堂曰帝配以父近而親之也此說得之事親章居上不驕君道也為下不亂臣道也在醜夷不爭兄弟朋友之道也前五者止施于父母之身此三者通于天下國家矣此三者不除雖能備前五者不足以為孝也聖人之教人皆欲其廣而充之故每進愈深孔孟之言大率如此五者備謂之能事親未足以盡孝子之名也必除後三者而後足以為孝觀辭意便可見也聖人教人常自小而至大然此但教人之法耳若聖人行之則雖小節而大在其中且如居則致其敬能致其敬則豈復有驕爭悖亂之事如飬則致其樂能致其樂則豈復有危亡兵刑之憂若在聖人行之則止用一字而天下之善備矣至于教人則不能且教之以敬其父母而不敢慢娛其父母而使之樂然後引而伸之使之推事親之敬以至于統臣妾統百姓統萬國無往而不致其敬推養親之樂以至于保四海保社稷保宗廟無往而不致其樂此一章之內所以有五者三者之序也五者備矣皆人子之善行也三者不除皆人子之惡行也五刑章罪莫大于不孝陳法以禁之也此大亂之道也明理以諭之也非聖人非孝之非語意與非先王之法言非堯舜之道同先儒作非毁之未通廣要道章廣至德章言孝悌禮樂皆歸于禮者自其德言之謂之孝悌自其事言之謂之禮樂循而行之之謂禮行而樂之之謂樂觀孟子事親從兄章可見孝主于愛而要道至德二章皆主敬為言者敬則愛心存不敬則愛心亡敬者行孝之綱領也顔淵問仁仁主于愛而其目皆曰禮即是此意使天下之臣子弟皆樂其道謂之要道使天下之君父兄皆被其德謂之至德要道言其操術之約至德言其流化之妙要言其發端至言其極效也感應章天遠故言明地近故言察易言觀天文察地理孟子言明庶物察人倫用字與此皆同聖人之事天命德討罪勑典秩禮皆有以合其心者敬之而已故知事父則知事天聖人之事地山川丘陵草木鳥獸皆有以成其順者愛之而已故知事母則知事地明察彰著四字當用司馬文正公說故事天明故事地察故上下治凡三條而結以天地兩條不言上下條者猶有尊有先宗廟修身凡四條而結以宗廟一條不言餘條也蓋能其所難則易者在其中矣法服法言德行三條結以言行不及法服者亦此意也必有尊也必有先也明皇以為諸父諸兄是也此兩條明上文長幼順之義不忘親也恐辱先也此所以申上文事父事母之義鬼神著矣此亦中上文神明彰矣之義凡此皆上言其大意此言其事目也自此以下復總結其意而極言之其曰孝悌之至則總父母長幼言之也其曰通于神明則總天地宗廟言之也其曰光于四海則併舉上下治而言之也孝悌雖是二事其實秖是一理書曰惟孝友于兄弟未有愛其親而不愛其親之子者也故經文或併列長幼而止結父母或專言父母而忽及長幼凡以明其理之一也明察順治之下止結以明察二字尊先敬謹之下止結以致敬一條皆並列長幼而止結父母也資父愛敬之下忽以孝對敬君子之教以孝也下忽以臣與悌參言之皆專言父母而忽及長幼也諫爭章慈愛恭敬疏云愛出于內慈為愛體敬生于心恭為敬貌文義頗精忠告而善道之不可則止爭友之說也事父母幾諫見志不從又敬不違勞而不怨爭子之法也爭臣之義有親疏小大之異事君章反復事君一章憂思懇惻之意惓惓如此此所謂以孝移忠者歟惟孔孟之心為能盡之此其所以居亂世事暗君而不害也喪親章孝經文體其發端結趨創問置答皆與小戴禮禮運燕居閒居哀公問儒行等篇相類孔子家語乃專用此格成書雖其中多聖賢格言然其出也必在孔門七十子之後鄒魯諸儒記誦師說言孝言禮各以其類薈萃成篇恐人之不尊也故每篇皆假設夫子與人問答以貫穿之必使衆說羣義同出于一口之中一人之問其有辭義太遠者則别為問端必使上承前說下起後義如文士作文之法而後已如諫爭章所謂若夫慈愛恭敬安親揚名則聞命矣敢問子從父之令可謂孝乎此其上承下接牽合粘綴最為明白者至于終篇復結之曰生民之本盡矣死生之義備矣孝子之事親終矣則又若問答之初先以默定為破題原題講腹結尾之成模而後言之者此一格必近下諸儒所撰不若緇衣等記等篇彚載聖言各出子曰既不失當時之實而又不妨次第其法使淺深先後以序相承也論語與家語之異蓋亦如此非謂家語皆非聖人之言也但其論載無法反以雜亂聖言為可惜耳大槩戰國諸生所著之書其體皆然如素問之書本自精奧而必假之黃帝岐伯之問答六韜言兵具亦為詳實而以為一一盡出于武王之問大公之對則陋矣鄭氏孝經以先王為大禹公羊氏春秋以王者為文王漢儒之泥往往類此明皇序親譽二字蓋用其上不知有之其次親之譽之劉炫明安國之本謂古文孝經二十二章也陸澄譏康成之注謂今文孝經十八章也劉炫隋人陸澄晉人分注錯經即杜預左氏𫝊序所謂分經之年與傳之年相附也古者經各為一書不相錯雜寫之琬琰謂石臺孝經也項氏家說附録卷一
