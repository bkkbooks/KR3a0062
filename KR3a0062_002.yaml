body:
  text: 項氏家說卷二宋項安世撰說經篇二李挺之反對法以乾坤變六十四卦李挺之反對法其實即生卦法也故世之言卦變者皆自挺之出其法以乾父坤母為二卦不反對又以乾坤三交生六卦亦不反對頤交大過一也小過交中孚二也坎交離三也又以乾交一隂生六卦反對姤反夬同人反大有履反小畜凡六也坤交一陽生六卦反對復反剝師反比謙反豫凡六也又以乾交二隂生十二卦反對遁反大壯訟反需無妄反大畜睽反家人兌反巽革反鼎凡十二也坤交二陽生十二卦反對臨反觀明夷反晉升反萃蹇反解艮反震蒙反屯凡十二也又以乾交三陰生十二卦否反泰恆反咸豐反旅歸妹反漸節反渙既濟反未濟凡十二也又坤交三陽生十二卦泰反否損反益賁反噬嗑蠱反隨井反困未濟反既濟凡十二也三陰三陽數內否泰既濟未濟四卦相重止各十卦爾右六十四卦雖皆自乾坤來而乾坤之交不出于三故推卦變者因乾坤初交為復姤而以為一陰一陽者皆自復姤來再交為臨遁而以為二陰二陽者皆自臨遁來三交為否泰而以為三陰三陽者皆自否泰來蓋乾坤之變自此六卦始則繼此而變者當推此六卦而為所從來之地理或然也反對說觀聖人列卦反對者自為偶不反對者亦自為偶而又置頤大過于上篇之末置中孚小過于下篇之末正反之際灼然有意非偶然也凡不相反對者其實亦相反對乾坤坎離以全體相反頤中孚象離大過小過象坎四卦亦全體相反是亦反對也此外又有以卦體相反者如屯坎上震下與解震上坎下之類是二體相反也有以卦義相反者如大過二陰包四陽小過四陰包二陽之類是二義相反也凡此皆可以參考卦爻之義又乾坤坎離本非相反對之卦而其所生之卦無不相反對者震巽艮兌皆相反對之卦頤大過中孚小過四卦乃不相反對是亦易道變通之理也十有八變說以卦言之卦之正而不反者八反對者二十有八聖人分十二反與六正為十八卦以為上篇分十六反與二正亦為十八卦以為下篇故上篇三十卦下篇三十四卦而俱為十八也以爻言之乾之六奇坤之六耦共為十有八畫以震坎艮三男之畫合乾之三畫亦為十八以巽離兌三女之畫合坤之三畫亦為十有八以數言之一三五為九以兩乘之為十八二四為六以參乘之亦為十八朱震易圖以六卦變六十四卦朱子發六卦之變即李挺之乾坤之變子既言之于前矣然其所以變之法不可不知也復姤一陰一陽皆在初爻變為二師同人為三謙履為四豫小畜為五比大有為六剝夬各成五卦凡一陰一陽者十卦皆自復姤變臨遁二陰二陽皆在初二兩爻第一變為初三明夷訟為初四震巽為初五屯鼎為初上頤大遇各成四卦再變為二三升無妄為二四解家人為二五坎離為二上蒙革亦各成四卦三變為三四小過中孚為四五萃大畜為五六觀大壯各成三卦四變為三五蹇睽為四上晉需各成二卦五變為三上艮兌各成一卦凡二陰二陽者二十八卦皆自臨遁變三變恐當為三四為三五為三上四變當為四五為四上五變當為五上否泰三隂三陽皆在下三爻第一變為初二四漸歸妹為初二五旅節為初二上咸損各成三卦再變為初三四渙豐為初三五未濟既濟為初三上困賁各成三卦三變為二三四益恆為二三五噬嗑井為二三上隨蠱各成三卦凡三陰三陽十八卦皆自否泰變右安世嘗推其說方三畫之時乾坤以三相交其變之形止于為六凡言重卦者出于六子及六畫之後以六相交其變之例亦止于六故以復姤遁臨否泰六卦為例之主而凡言變卦者皆出焉亦猶三畫之有六子也虞氏朝氏旁通卦法虞翻易專用旁通說以解爻義其法皆取相反之卦陰反陽陽反陰即以反為通如夬之一陰五陽即與剝之一陽五陰相通也本朝朝說之據先天圖以通六十四卦今總而類之其說有三其一曰以對相通如乾之通坤震之通巽艮之通兌其圗位相對其爻象相反此即虞氏旁通之法也至其異處則坎離相對而不相通謂坎通離則坎死乎坤離通坎則離死乎乾此則虞氏之所不避也其二曰以近相通如自乾而通于兌離震巽坎艮自坤而通于艮坎巽震離兌者順數也自乾而通于巽坎艮兌離震自坤而通于震離兌艮坎巽者逆數也乾坤順逆各通六卦並其子之在本卦前者皆通之此父母之道也若六卦自通則順逆各通一卦此兄弟之卦也凡此皆以先天圓圖言之也又曰乾上變而逆數通于履兌子也在兌前同人革離子也在離前無妄隨噬嗑震子也在震前升蠱井巽子也在巽前師䝉坎子也在坎前謙艮子也在艮前又下變而逆數通于姤巽子訟渙坎子遁漸蹇艮子臨睽歸妹兌子明夷豐離子復震子坤之所通亦然凡此皆以先天方圖言之也方圖之上變即圓圖之所謂順方圖之下變即圓圖之所謂逆也其三曰以類相通謂之即變即通不限逺近不拘對否如一陰一陽自復姤變則凡一陰一陽卦皆復姤之所得通也二陰二陽自臨遁變則凡二陰二陽卦皆臨遁之所得通也獨泰否三陰三陽自相為通不取他卦則又自用對通之法矣圖中餘卦亦倣此三說其以對通者即夬與剝通之類是也其近通者謂本母七子無相類者則近通旁母之一子如兌之子履通乎乾之子小畜之類是也其以類通者謂本母內七子有相類者則不限多少皆可相通如乾之夬通乎大有又通乎小畜皆一陰之卦也而以近通者又有二法有以近而取對卦者如兌之子履本對謙之一陽乃近取乾子小畜所對之豫以為相通之卦此又對通之變例也有以近而取二體者以卦之上下二體各取旁卦之子與之相通如夬之下體為乾則自乾通兌之七子夬之上體為兌則自兌通離之七子此又旁通之變例也朝氏之說繁雜難曉故類為三說而令其易通京房易法以八卦變六十四卦以京氏易考之今世所傳火珠林者即其法也今占家以三錢擲之兩背一面為拆此即兩少一多為少陰爻也兩面一背為單此即兩多一少為少陽爻也俱面者為交交者拆之此即三多為老陰爻也俱背者為重重者單之此即三少為老陽爻也蓋以錢代蓍一錢當一揲此自後人務為徑捷以趨卜肆之便而其本意則尚可考也其所異者則不以交與重為占而自以卦世為占故其占止于六十四爻而不能盡三百八十四爻之變爾納甲法京氏易凡卦之六爻皆分主六甲今以卦推之乾納甲壬坤納乙癸蓋父母之卦主十干之始終者也艮納丙兌納丁蓋少男少女故皆近初初則為少也坎納戊離納已蓋中男中女故皆居中也震納庚巽納辛蓋長男長女故皆近終終則為老也以爻推之乾初起甲子二甲寅三甲辰四壬午五壬申上壬戌則父起黃鍾天之統也坤初起乙未二乙巳三乙卯四癸丑五癸亥上癸酉則母起林鍾地之統也震初起庚子二庚寅三庚辰四庚午五庚申上庚戌則長男從父也巽初起辛丑二辛亥三辛酉四辛未五辛巳上辛卯則長女次長男也坎初起戊寅二戊辰三戊午四戊申五戊戌上戊子則中男次長女也離初起己卯二己丑三己亥四己酉五己未上己巳則中女次中男也艮初起丙辰二丙午三丙申四丙戌五丙子上丙寅則少男次中女也兌初起丁巳二丁卯三丁丑四丁亥五丁酉上丁未則少女次少男也此其為序皆明白無可疑者大抵陽卦則納陽干陽支陰卦則納陰干陰支陽六干皆進陰六干皆退惟乾納二陽坤納二陰包括首尾則天地父母之道也歟世應例京氏易法止用八卦為本得本卦者皆以上為世爻得歸魂卦者皆以三為世爻亦因下體復得本卦而三在本卦為上也其餘六卦皆以所變之爻為世世之所對者為應凡其所謂變者非以九六變也皆自八純卦積而上之知其為某爻之所變爾今且以乾卦為例乾之本卦上九為世九三為應乾之變卦初變為姤謂之一世卦初六為世九四為應再變為遁謂之二世卦六二為世九五為應三變為否謂之三世卦六三為世上九為應四變為觀謂之四世卦六四為世初六為應五變為剝則謂之五世卦六五為世六二為應剝之四復變為晉之遊魂卦九四為世初六為應晉之下卦三爻皆變為大有坤復歸乾謂之歸魂卦九三為世上九為應右乾宮八卦世應法坤震巽坎離艮兌倣此飛伏例京氏易于世爻用飛伏法凡卦見者為飛不見者為伏其在八卦止以相反者為伏乾見則坤伏震見則巽伏坎見則離伏艮見則兌伏及坤巽離兌之見也亦然皆以全卦相反也至八卦所變之世卦則不然自一世至五世因一本生純卦為伏蓋五卦皆此一卦所變也至遊魂歸魂二卦則又近取所從變之卦為伏不逺取本卦亦不以相反論也今以乾一卦為例如乾一世姤姤下體巽其飛為巽初辛丑其伏仍用乾初甲子若用相反則當震初庚子也二世遁遁下體艮其飛為艮二丙午其伏仍用乾二甲寅若用相反則當兌二丁卯也三世否否下體坤其飛為坤三乙卯其伏為乾三甲辰凡卦變至第三爻自然相反也四世觀觀上體巽其飛為巽四辛未其伏仍用乾四壬午若相反則當震四庚午五世剝剝上體艮其飛為艮五丙子其伏仍用乾五壬申若相反則當兌五丁酉以上五世皆以本卦乾爻為伏者也自五世復下為遊魂卦剝之四變為晉自艮變離故其飛為離四己酉其伏為艮四丙戌若用相反則當坎四戊寅復下而為歸魂晉下三爻變為大有自坤變乾故其飛為乾三甲辰其伏為坤三乙卯二魂卦皆近即所從變之卦不用本生純卦也右乾宮八卦飛伏例坤震巽坎離艮兌倣此術家七變法京氏以六畫卦變為七卦并本卦為八今術家以三畫卦變為七卦並本卦為八其法以上一爻變者為生氣上中二爻變者為天醫三爻俱變為絶體上下二爻變中爻不變者為遊魂下一爻變者為五鬼下中二爻變者為福德上下二爻不變中爻獨變者為絶命三爻俱不變者為復歸如乾三畫卦則以兌為生氣震為天醫坤為絶體坎為遊魂巽為五鬼艮為福德離為絶命乾為復歸餘卦倣此推之今之術家多用此法以占行年其推主卦則用河圖九宮法以年紀為宫數一坎二坤三震四巽六乾七兌八艮九離之法惟五宮無卦男五宮則歸艮皆土數也歐陽子易說或曰歐陽子說易奈何曰其說以大衍為筮占小事而不之學夫謂大衍為止于筮占是歐陽子又未知聖人之筮占也彼既以今世巫史之術待筮占又以今世之筮占待大衍則其以為不足學也又何難焉鄭夬說以復姤生六十四卦乾兌離震巽坎艮坤以次相生重一卦為八卦為六十四卦此重卦法也而先天圖用之其畫自一陰一陽始左畫自復之一陽逆數而至乾右畫自姤之一陰順數而至坤故鄭夬謂乾坤生八卦為大父母復姤生六十四卦為小父母其說蓋出于此按先天圗法第一畫左陽右陰第二畫左右各兩分之上半畫陽下半畫陰凡二陽二陰相間第三畫左右各四分之四陽四陰相間共成八畫此八卦也第四畫左右各八分之八陰八陽相間共成十六畫第五畫左右各十六分之十六陽十六陰相間共成三十二畫第六畫左右各三十二分之三十二陽三十二陰相間共成六十四畫此六十四卦也重卦既成按而數之乾兌離震巽坎艮坤八八相次其序天成不可亂也自初畫言之謂之復姤生六十四卦可也自成體言之亦八卦生六十四卦爾然與京氏不同者京氏以爻相變先天圖以卦相重此其異也先天圖畫法先天圓圖第一畫陽左而陰右第二畫至第六畫陽上而陰下一言以蔽之曰有一必有兩而已一者太極也兩者陰陽也太極固有陰陽陰陽各為太極陰亦有陰陽焉陽亦有陰陽焉陰陽之初相對而生故陽左而陰右陰陽既立相乘而變故陽上而陰下一必有兩故初畫為二是為兩儀二各有兩故再畫為四是為四象四各有兩故三畫為八是為八卦此卦之小成也八各有兩故四畫為十六十六各有兩故五畫為三十二三十二各有兩故六畫為六十四此卦之大成也先天後天卦位邵先生曰乾坤縱而六子橫易之本也謂伏羲先天之卦震兌橫而六卦縱易之用也謂文王後天之卦張行成曰先天造化之初也伏羲八卦天位也兼天上地下言之天山水風澤火雷地後天生物之後也文王八卦地位也獨據地上言之離坤兌乾坎巽震艮所以坎離震兌當二分二至之中安世按先天卦位三陽在上三陰在下震巽以下爻變故次下艮兌以上爻變故次上坎離以中爻變故次中此天地定位陰陽始交而生六子之序也伏羲作卦之初以三畫相交而成其序固當如此此所謂易之本造物之初也說卦三索蓋明此也邵氏先天圗即此理也後天卦位有地之後正南午位離火王焉正北子位坎水王焉震木王于卯故震居東兌金王于酉故兑居西土王中央故坤位金火之間艮位水木之間皆陰陽之中且寅申相對也兌為陰金乾為陽金故乾次兌而居西北震為陽木巽為陰木故巽次震而居東南皆以五行生王為序此所謂易之用生物之後也說卦帝出乎震一章蓋明此也濂溪太極水火木金土即此理也文王八卦之位天一陽降于地自坎而艮自艮而震萬物盈焉地一陰升于天自巽而離自離而兌萬物虛焉天為物始故乾居坎之先土位中央故坤艮居離兌坎震之中暑將為寒坤居其間寒將為暑艮居其間皆土中央之義也兌為隂金乾次之為陽金震為陽木巽次之為陰木皆陰陽之交猶接前氣也項氏家說卷二
