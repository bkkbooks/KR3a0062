body:
  text: 項氏家説目録儒家類卷一説經篇一卷二説經篇二卷三説經篇三卷四説經篇四卷五説經篇五卷六説經篇六卷七説經篇七卷八説事篇一卷九説事篇二卷十説政篇説學篇附録卷一孝經説附録卷二中庸臆説臣等謹案項氏家説十卷附録二卷宋項安世撰安世有周易玩辭已别著録此蓋其讀經史時條記所得積以成編者案嘉定辛未樂章撰周易玩辭後序曰項公昔忤權臣擯斥十年杜門卻掃足迹不涉户限耽思經史專意著述成書數篇逮兵端既開邊事告急被命而起獨當一面外禦憑陵內固根本成就卓然陳振孫書録解題亦稱其當慶元中得罪時論居江陵杜門潛心起居不出一室送迎賓友未嘗踰閾諸書皆有論説然則是書慶元間斥居江陵時作也安世學有體用通達治道而説經不尚虛言其訂核同異考究是非往往洞見本原迥出同時諸家之上是書見於宋史藝文志者十卷附録四卷又别出孝經説一卷中庸説一卷書録解題並同自明初以來其本久佚今惟散見永樂大典各韻內核其所載多兼及説經説事説政説學等篇名而逐條又各有標題其原書體例約略可見篇帙亦尚多完善謹依類排纂經則按各經之文次之卷一卷二並易説卷三書説卷四詩説卷五周禮卷六禮記卷七論語孟子等是為説經篇凡七卷其八九十三卷則先以説事篇次説政篇次説學篇雖原目無存未必悉符其舊然陳振孫説是書有云九經皆有論著其第八卷以後雜説文史政學則序次大致當亦不甚懸殊振孫又云附録孝經中庸詩篇次邱乘圖則各為一書重見諸類似附録之四卷本分為四種單行而復取以附於家説後者也今檢永樂大典但有孝經説中庸臆説二書而詩篇次邱乘圖未經收入疑當時即已散佚無可考補謹據其現存者仍合為附録二卷次之於末以略還原書之舊焉乾隆四十七年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
