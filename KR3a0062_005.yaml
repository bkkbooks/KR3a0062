body:
  text: 項氏家説卷五宋項安世撰説經篇五九穀黍稷豆麻麥五穀也加稻粱苽小豆九穀也無麻并二豆六穀也此出炙轂子按舊説則黍稷稻粱三豆二麥為九穀肺為麻肝為麥心為黍腎為菽脾為粟此出酉陽雜俎按舊説則夏食菽冬食黍與此相反春麥秋麻中央粟則同粟名粱黍稷皆粟類也穀之名五而粟之類居其三故凡穀之實古今皆以粟呼之禾者穀穗之總名古唯粟穗得專稱禾亦此意也按本草稷正粟也此説為是若黍則有二種正黍似粟而大以五月熟與禮記月令及漢舊儀合今荆人專謂之黍又謂之黍穄者是也又一種尤髙大稈之狀至如蘆實之狀至如薏苡荆人謂之討黍又謂之蘆穄此則本草所謂黍似蘆者然以秋熟非正黍也稷即穄字黍本稷之大者故二黍皆兼稱穄猶牟麥皆稱麥菽答皆稱菽也粱似稷而肥美猶稻之有秈也大率三種之中黍最大故以黍冠稷粱最美故以粱配稻又按曲禮稷曰明粢即所謂粢食不鑿昭其儉也黍曰薌合則稍美矣粱曰薌萁則併其秆美之三者之髙下於此可見然古稷最先出故為五穀之長貴其本也是以月令登麥登黍登稻皆著本名獨于稷謂之登穀猶今南方稱穀惟禾稱米惟稻專之他穀皆不預也九賦成功鄭氏謂九功為九職之民所貢若今之口稅九賦為計口所出若今之丁錢安世竊謂大宰之九賦司會之九功司書之九正閭師之八貢皆九職之賦一事而異名爾無所謂丁錢者也雖邦國之九貢亦止於其國中就王所食之地斂其民職之賦轉買用物以充常貢未有外其職而稅其身者也無職而稅者惰民之罰也豈得人人而施之况有職之民亦自有無稅者故閭師所督凡民獨無臣妾之貢見蔬茹之不稅也臣妾不稅而稅良民可乎特九功兼備衆民九賦止據地為等差二者不能相備故司會以九功為民職之財以九賦為田野之財二者交相經緯其法始全爾今按載師所任即九賦也閭師所督即九功也且既謂之田野之財則非以口賦明矣召公諄諄然以訓武王者母亦珍禽竒獸非服食器用之宜而自以異物為寶則玩好之心一萌其弊烏可勝言哉此九貢之目自祀貢嬪貢以至於斿貢物貢蓋無不適於用者後世人主汲汲於方物之貢至於鵁鶄名鷹亦遣使以求之何謂正月正嵗正月正嵗之辨魏明帝景初元年以建丑之月為正以三月為孟夏四月其春夏秋冬孟仲季月雖與正嵗不同至於郊祀迎氣礿祠蒸嘗巡狩嵬田分至啓閉班宣時令中氣早晚敬授民事皆以正嵗斗建為厯數之序安世按此所稱正月正嵗蓋用周禮鄭氏説謂正月為周正正嵗為夏正也其四時孟仲季月與正嵗不同蓋用春秋説以夏時冠周月也然此二説皆不可用也周官正月自是夏正正嵗郤是建子蓋周王所改以受朝賀故謂之正嵗四時十二月實未嘗改亦不可改也春秋所書自是孔子特筆以正時王之誤明子丑二正不可復行也今魏氏乃取孔子之所非者用之不亦悖乎牧監參伍殷輔劉彝中義曰牧謂一州之事總七卒者監謂天子大夫為三監于其國者參謂卒正總三連之國者伍謂屬長總五國之治者殷謂衆國君輔謂列國之上卿輔其治者安世按此皆約禮記王制為説劉彞祠部安定胡先生之髙第弟子也其所學有傳授而尤講于治道所著周禮五官中義多所發明故摘其異于鄭氏者記之天官其屬六十劉彝中義曰小宰曰天官其屬六十皆王者所用以自治也按自財用飲食衣服次舍嬪婦屨追夏采皆自治之具謂之治典其旨深哉六職小宰之六職即大宰之六典也六典之所施曰邦國曰官府曰萬民六職之所施止曰邦國曰萬民皆去官府而别以一事代之然則官府之所主即此事乎蓋嘗考之治職以節財用為主能節財用則制度立嗜欲清而後格君之業愛民之政可得而施矣此出治之大本也是以冢宰掌之教職以懷賓客為主修文教以懷諸侯則兵革不試而禍亂不作然後民生殷富而禮俗可興此立教之本也是以司徒掌之禮主於事鬼神則和邦國諧萬民者皆對越之誠意而無貌隆情薄之弊矣政主於聚百物則邦國萬民服之正之之外不求快焉而無財殫力屈之禍矣刑主于除盜賊則禦寇而不為寇無好刑之心也事主於生百物則化材而不傷財無興作之意也漢之武帝窮兵峻刑役繁事廣則政刑事之三職皆廢雖興禮樂玉帛鐘鼓而已豈有直清諧遜之實可以交神明雖立學校備弟子員而已豈有偃武息民之意可以懷逺人當是時也公孫𢎞實居冢宰之任專持人主病不廣大人臣病不節儉之説以逢長之治本既亡六職盡廢然後知周公之典不可違也𢎞世為大臣多見先秦書此説必有所本禮記王制則漢之經生止據孟子所聞為説孟子固自謂不得周之典籍則其所聞止是太史公所引之下一節上不過百里下三十里之類而已卻無太史公上一莭之説也劉彝周禮中義曰孟子謂齊魯之封止於百里然魯頌者仲尼所編乃與此經符合孟子當衰亂之時不見其書之詳也傅别書契質劑小宰之八成曰聽稱責以傅别聽取豫以書契聽賣買以質劑鄭注云傅别者大書一札中字别之書契者出豫受入之凡要簿書之最目獄訟之要辭皆曰契質劑者兩書一札同而别之長曰質短曰劑安世按質人之職曰凡賣儥者質劑焉大市以質小市以劑此質劑長短之驗明矣又曰掌稽市之書契鄭注云書契者取豫市物之劵兩書一札而刻其側則契書之制又與質劑同矣遂人曰凡治野以下劑致氓旅師曰以質劑致民平頒其興積鄭注云案其入稅者貸之則質劑乃為民間入稅之符驗也朝士凡有責者有判書以治則聽鄭注云故書判字為辨辨讀為别此蓋小宰之所謂别也又曰凡屬責者以其地傅而聽其辭鄭注云以其地之人相比近者為證此蓋小宰之所謂傅也如此則傅者其人别者其書也大抵三者之制必皆相類兩劵同書各執其一而大書其側中分之以為驗此劵之通法也事不同故名異耳鄭氏謂傅别質劑皆今劵書特事異異名其説是矣而一以為大書一札而中别其字一以為兩書一札同而别之二説自舛易故學者惑焉八職宰夫八職一曰正掌官法以治要法即治象之法教象之法政象之法形象之法六官之長各掌一官之法以治其大要也正即六官之長如大宰大司徒是也二與正同職故不言二也二曰師掌官成以治凡成即以參互考日成以月要考月成以嵗會考嵗成皆治事之文書也六官之中各掌其羣吏之成以治其凡最也凡與要相近而不同要者總歸於一凡者分總衆條如凡祭祀凡賓客凡喪紀凡軍旅每事各有一凡也師即六官之中如宰夫鄉師肆師士師是也三曰司掌官法以治目此項官法乃一司之專法如膳府之膳法醫府之醫法酒府之酒法司其事各掌其本司之法以治其事目也目者一事一件之名如綱之目也四曰旅掌官常以治數常者官府之故常如今之祖例每官之中各有衆士掌檢舉祖例以點校諸司行遣文書之數或有漏落或有增添與故事不合則詰問而鉤考之此旅下士之職也正師司旅四職先儒訓詁未明故詳釋之府史胥徒四職自明不假重説疾醫疾醫三訣以五氣五聲五色視其死生此今醫家之望與聞也兩之以九竅之變此今之問證也參之以九藏之動此今之切脈也但古以為三今以為四耳鹽人劉彝中義曰有刮於地而得者苦鹽也與玄酒明水同意有風其水而成者飴鹽也産於中土其味甘有熬其波而出者散鹽也又有汲於井而為者有積于鹵而結者煮鹽謂鹽之陳者其色黑或化而為水用火煉治則潔白如初掌舍劉彝中義曰梐枑以衛車宫車宫以衛壇壝壇壝以衛天子之會同為帷宫於其所以待王之休息蓋四者合而為一宮也掌次劉彝中義曰案牀也以為王位安世按此牀則今之御榻也內小臣劉彝中義曰內小臣奄上士四人王后之尊亞王一等而傳其命者止於四人六宮六寢之奄士寺人內豎共不過二十人三代禮樂惟周為備而其定制乃如此六書古製字之初民俗尚朴有形者用其形則謂之象形日月之類是已無形者象其事則謂之指事上下之類是已其後事物之衆不能盡象其形也則取其形之類者配聲而呼之謂之諧聲如江河皆水之形而以工可為聲也不能盡象其事也則取其事之類者配聲而呼之謂之轉注言同出一事轉生異名焉如耄耋皆老者之事而以毛至為聲也又其後也合數字而為一字則謂之會意如止戈為武人言為信之類是也借一字而為數字則謂之假借如使令人之令為政令長短之長為長幼是也凡制字之法盡於此矣後之作不可以有加矣後世俗書多用諧聲轉注之法以增廣文字凡字之偏傍古所不用者一皆增之如云之增雨為雲原之增水為源夫容增草為芙蓉番昜增邑為鄱陽則凡天下之物皆以諧聲之法寫之矣奉共皆增手為捧拱昏因皆增女為婚姻告戒之為誥誡次且之為趑趄則凡天下之事皆以轉注之法寫之矣故古人通用之字假借之法一切盡廢而字書充牣至不可勝載矣豫嘗謂俗人書字專用諧聲轉注王介甫説字專用會意其精粗雖異皆墮於一偏也六書雖六其實三也象形指事皆以形為之諧聲轉注皆以聲為之會意假借皆以意為之天下之理盡於形聲意而已三者又出於二形之中象形屬形指事屬意聲之中諧聲屬形轉注屬意意之中會意屬形假借屬意凡有者皆形也凡無者皆意也然非聲則形與意皆無自而達則二者又同寓於一矣有聲然後有字字則聲之形聲則字之意一亦何嘗不二哉祈珥劉彝中義曰肆師之祈珥小子之珥於社稷祈於五祀羊人之祈珥共其羊牲犬人之幾珥用駹珥字皆當為弭之誤祈謂求福弭謂止災變几仍几劉彝中義曰司几筵曰吉事變几謂吉祭王在室則設几於胙席從王所在變而旋設之也凶事仍几謂不知其神祗所在凡其位處皆各設几如顧命之四仍安世按鄭氏謂變者每事各設仍者朝夕同用一几與此正相反大合樂劉彝中義曰大合樂之本諸儒未有達者夫陰陽日月之精氣也日月會于上則陰陽合於下以十有二合為十有二管自陰生至於冬至凡六管之長短皆陽氣入地之深淺而始與陰合陰合于陽上進而葭灰飛動者皆其月之中氣也自陽生至於夏至凡六管之長短皆陰氣入地之淺深而始與陽合陽合於陰上進而葭灰飛動者皆其月之中氣也所取者天地之中聲所候者陰陽之和氣而人又以天地之靈氣備其樂德於中五常富於內則五聲和於外乃以五聲正其八音乃調八音以興六舞假先王道德之音容薦人主中和之至德故能致鬼神示和邦國諧萬民安賓客説逺人作動物也六樂劉彝中義曰凡樂以律為宮則以呂為升歌之宮以吕為宫則以律為升歌之宮陰陽之氣合則宮商之聲和也黃帝之雲門以黃鍾為宮髙陽髙辛同之至堯咸池始以大蔟為宮舜大㲈以姑洗為宮禹大夏以蕤賓為宫商大濩以夷則為宮周大武以夾鍾為宮六變八變九變劉彝中義曰六變八變九變皆合先代之樂圜鍾為宮周樂也以仲呂為商函鍾為角南吕為徵應鍾為羽而升歌以無射為宫焉黃鍾為角大蔟為徵姑洗為羽商樂也以夷則為宫無射為商而升歌則以仲呂為宮焉雲門黃帝之舞也此合三代之樂以祀天也函鍾為宫者夏樂也升歌則以蕤賓為宫大蔟為角者周樂也無射宫之角聲也南吕為羽者黃帝樂也大吕宫之羽聲也升歌則以黃鍾為宮咸池堯之舞也此合四代之樂以祭地也黃鍾為宫者黃帝之樂大吕為角者舜之樂大蔟為徵者商之樂應鍾為羽者周之樂九德九韶者舜之歌舞此合四代之樂以享宗廟也六代之樂未有不旋相為宫而成聲者先儒妄謂祭尚柔無商聲以惑後世景佑樂有四清宫以旋相之管無射為宮黃鍾為商臣大君小為逆故折半黃鍾之管以為清宫環拜以鐘鼓為節環拜者環四方而拜則明堂之位方明之壇圜丘之祀也環三方而拜則天子三朝之庭也合陰陽之聲太師掌六律六同以合陰陽之聲其法與易之六位世應納甲之六辰及斗之所建日月之所會皆相應不差今略疏其法如後陽聲黃鍾子與陰聲大吕丑合在納甲為乾初甲子應坤四癸丑在天為斗建子而日月會於星紀丑斗建丑而日月會於玄枵子今陰陽家所謂子與丑合也陽聲大蔟寅與陰聲應鍾亥合在納甲為乾二甲寅應坤五癸亥在天為斗建寅而日月會於娵訾亥斗建亥而日月會於析木寅今陰陽家所謂寅與亥合也陽聲姑洗辰與陰聲南吕酉合在納甲為乾三甲辰應坤上癸酉在天為斗建辰案原本脫斗建二字今補而日月會于大梁酉斗建酉而日月會於夀星辰案原本脫此三字今補今陰陽家所謂辰與酉合也陽聲蕤賓午與陰聲林鍾未合在納甲為乾四甲午應坤初乙未在天為斗建午而日月會於鶉首未斗建未而日月會於鶉火午今陰陽家所謂午與未合也陽聲夷則申與隂聲中吕已合在納甲為乾五壬申應坤二乙巳在天為斗建申而日月會於鶉尾巳斗建巳而日月會於實沈申今陰陽家所謂巳與申合也陽聲無射戌與陰聲夾鍾卯合在納甲為乾上壬戌應坤三乙卯在天為斗建戌而日月會於大火卯斗建卯而日月會於降婁戌今陰陽家所謂卯與戌合也大抵斗常左行日月常右行乾主竒月自子左行坤主偶月自未右行則凡陰陽相合之位律吕相生之法無不應者凡此皆理之自然者也卜師掌開龜之四兆劉彝中義曰開龜者將卜則開龜之下體去其外甲然後燋之其下甲中有直文者所以分左右陰陽也橫有五文以分十二位者象五行與辰次也去其上下不可以為兆可開而燋者左右各四故曰四兆寤夢周禮占夢之官掌占六夢其一曰寤夢解者不得其説按孔子家語云天災地妖所以警人君也寤夢徵怪所以警人臣也災妖不勝善政寤夢不勝善行以此觀之則不寐之時恍惚獨有所見如狐突之見其太子者古人皆名為寤夢也理既到而語亦精古人之工於命物如此六祝六祈九祭大祝曰六祝者祭享祀之祝辭六祈者特為一事祭而祈之也九祭當是宗廟皇尸祭食之法是以大祝掌之尸坐祝始命尸祭韭菹曰命祭上佐食取黍稷及肺授尸兼祭曰衍祭衍者多也次賓羞羊燔尸祭之曰炮祭賓尸依殽序遍祭曰周祭振擩絶繚同鄭説凡尸之食祭皆上佐食工祝共之所以尊尸曰共祭肅拜鄭氏注周禮肅拜云若今婦人撎安世按古之拜如今之揖折腰而已介胄之士不拜故以肅為禮以其不可以折腰也然則其儀特斂手向身微作曲勢耳鄭氏之所謂撎蓋如此此正今時婦人揖禮也據鄭氏説則漢時婦人之拜不過如此或者乃謂自唐武氏始尊婦人不令拜伏則妄誤之甚矣周天元時令婦人拜天臺作男子拜則其俗婦人亦不作男子拜也况古者男子之拜但如今之人揖則婦人之拜安得謂如今人之伏此理之必無者也大抵今之男子以古男子之拜為揖故其拜也加之以跪伏為稽顙之容今之婦人亦以古婦人之拜為揖故其拜也加之以拳曲作虛坐之勢視古已加不得謂之減矣禮所謂女拜尚右手者特言斂手向右如孔子拱而尚右之尚非若今用手按膝作跪也男子尚左亦然古跪自是一禮與拜與伏皆不相干太史內史劉彝中義曰太宰以八柄詔王而內史又以察太宰之中否失其中則弗書其命也又曰太宰之建六典以行於邦國太史之建六典以傳于後世巾車劉彝中義曰巾車后之五路與王之五路相備錫面朱總與錫樊纓相備勒面繢總與鉤樊纓相備雕面鷖總與象路相備具面組總與革路相備組挽與木路相備喪車五乘自王至士無等降三年之喪皆乘木車齊衰素車大功薻車小功駹車緦麻漆車服車五乘上得以兼下則獨備五車矣二車各從其命數孤六大夫四上士三中士二下士一矣所建旗斿如二車之數師都之名司常大閲之制曰師都建旗注六鄉六遂大夫也州里建旟縣鄙建旐注州里縣鄙鄉遂之州官互約言之大司馬茇舍之制曰帥以門名注軍將也縣鄙各以其名注縣正鄙師至鄰長也家以號名注食采地者鄉以州名注州長至比長也野以邑名注公邑大夫也安世按鄭氏注文則司馬之所謂帥即司常之所謂師都也許氏説文亦以師都為率都率即帥也其辨明矣至于治兵之制乃曰軍吏載旗注諸軍帥也師都載旜注遂大夫也鄉遂載物注鄉大夫也或載旜或載物衆屬軍吏無所將也郊野載旐注郊謂鄉遂之長縣正以下野公邑大夫也百官載旟忽于師都之上加一軍吏而鄭氏之注始雜亂而不能通矣安世按鄭氏謂有軍衆者畫異物今軍吏載旗故知其為諸軍之帥無軍衆者載帛不畫今師都載旜鄉遂載物故知其為無所將以此推之則司常大閲之制是鄉官自為將而王官不為將之法故不别除軍吏也司馬治兵之制是王官為將而鄉官不為將之法故别以軍吏載旗於師都之上移師都鄉遂以載孤卿大夫士之旜物移孤卿大夫士以載縣鄙之旟蓋兩易之也皆為不可豫定故因一時之教各習一法其於官名非臨時設也鄭氏不察遽改司馬之師都鄉遂别為一説礙而不通師都止當依司常説為鄉遂之大夫鄉遂郊野止當依司常説為鄉遂之官互約言之則理自明不煩改易蓋郊即鄉也野即遂也鄉遂以官言明不為將所以載物郊野以民言明别將將之所以載旐百官孤卿大夫士各將所食采地之兵所以載旟凡此皆可見鄉官皆不為將而王官皆為將矣師都建旗周禮師都建旗説文曰率都建旗然則師字本作帥字也皆畫其象焉劉彝中義曰皆畫其象畫亦書也書小畫大大則可以逺見曰事曰號曰名皆書於旗額旞與旌皆繫于旗上所謂注旄于干首也五隸劉彝中義曰積任搏執煩辱牽倣者皆其罪之所宜也養鳥獸牧馬牛與獸言者皆其俗之所習也彼皆必死之人既復生之又衣食之因其所能以盡其用故可以守王宫野舍以為腹心之衛聖人於萬民各極其宜者如此柞氏劉彝中義曰柞氏之攻草木選材以資木工天官所謂飭化八材也夏至陰生則刋陽木之陰以去其所不足者以火養其所刋則可以齊諸陽冬至陽生則剝陰木之陽以去其所不足者以水養其所剝可使齊諸陰春秋二分陰陽之氣均木之理亦然當以火養其陰水養其陽則化而為一以為器則固也大行人先儒謂六服各以其嵗而朝循環以行四時之禮則為要服者凡二十四年而後遍於朝覲宗遇將何以圖事比功陳謨協慮乎蓋卒正連帥所總之國每嵗各隨其服分為四時之朝多寡之數大約相等六服四時各獲朝貢逺者國多故嵗多而遍近者國少故嵗少而遍也司儀劉彝中義曰聖人雖能役使四方來朝然不敢獨當其尊故朝於國中則帥之以奉宗廟會於郊外則帥之以拜日月既拜則又設方明於壇上而祀天地四方以告其所以會皆有所尊不敢當之以己也掌客劉彝中義曰掌客曰掌賓客之牢禮其别有五王不巡守會諸侯而饗之一也王巡守殷國國君膳王及公卿大夫士庶子二也諸公相為賓三也侯伯相為賓四也子男相為賓五也用龍用將周禮玉人之事全龍瓚將先儒注釋其説不能盡通按説文天子用全純玉也上公用駹四玉一石諸侯用瓚三玉二石伯用埒玉石半相埒也然則龍字當為駹字將字當為埒字矣矛殳矛冒也刃下冒矜也長八尺曰矟馬上所用唐六典謂之漆槍木槍制長則步兵用之又有曰幹槍羽林所執朴頭槍金吾所制朴頭即殳也宣欘柯磬折考工記車人之事半矩謂之宣注説不通豫按爾雅云璧大六寸謂之宣今半矩為宣則矩當尺有二寸宣當六寸也一宣有半謂之欘則欘當九寸也一欘有半謂之柯則柯當一尺三寸有半也下文有車柯長三尺與此不同者此常柯也一柯有半謂之磬折則磬折當二尺餘四寸之一也鄭氏謂磬折為人折腰自帶以下長四尺五寸非也謂折腰如磬則可不可以磬折為腰也按磬氏為磬倨句一矩有半注云以一矩為句一矩為股其兩頭相直處正當一矩有半然不能言矩之長短今以此法推之尺有二寸為一矩則一句一股各長尺有二寸其兩頭弦上當一尺八寸是為一矩有半矣如此則其磬內折處正當二尺適與此一柯有半相合是為象磬氏之折又明矣蓋磬股之博六寸磬句之博三分去一為四寸磬氏為磬句處為股今取磬內一面曲折量之股長一尺二寸除四寸為句博所侵止有八寸合句之一尺二寸是為二尺也項氏家説卷五
